<!DOCTYPE html>
<html lang="ar" dir="rtl"> 
<head>

  <style>
 @font-face {
  font-family: 'NotoKufiArabic';

}

:root{
  --yellow:#f4e733;

*{box-sizing:border-box}

html,body{

.page-wrapper{

.header-container{
  background:#fff;

}

.header-right{
  max-width:1400px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  padding:18px 40px;
}

.header-right img.logo{
  height:64px;
}

.divider{
  width:3px;
  height:58px;
  background:var(--yellow);
  border-radius:10px;
}

.header-info{
  text-align:center;
}

.arabic-name{
  font-size:22px;
  font-weight:bold;
  color:var(--blue);
}

.english-name{
  font-size:14px;
  color:#2f80ed;
  font-weight:600;
}

main{
  flex:1;
  padding:28px 18px;
  text-align:center;
}

.container,
#login-section{
  max-width:680px !important;
  margin:35px auto !important;
  background:#fff !important;
  border:1px solid var(--border) !important;
  border-radius:24px !important;
  padding:28px !important;
  box-shadow:0 12px 28px rgba(0,0,0,.08) !important;
}

#login-section h3,
#scanner-section h3,
#scanner-section label{
  color:var(--blue) !important;
  font-weight:bold;
}

input,select,textarea{
  width:90%;
  max-width:360px;
  margin:10px auto;
  display:block;
  padding:13px 15px;
  font-size:15px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#f8fbff;
  color:var(--text);
  font-family:'NotoKufiArabic','Cairo',sans-serif;
}

button{
  width:90%;
  max-width:360px;
  background:var(--yellow);
  color:#222;
  cursor:pointer;
  padding:13px;
  font-size:15px;
  border-radius:14px;
  margin:10px auto;
  display:block;
  border:none;
  font-family:'NotoKufiArabic','Cairo',sans-serif;
  font-weight:bold;
  transition:.2s;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(0,0,0,.12);
}

#reader{
  width:320px;
  max-width:95%;
  border:3px solid var(--yellow);
  border-radius:20px;
  background:white;
  margin:22px auto;
  overflow:hidden;
}

#status{
  margin:22px auto 0;
  padding:16px 18px;
  background:#f8fbff;
  border:1px solid #dbeafe;
  border-radius:18px;
  color:var(--blue);
  max-width:520px;
  font-weight:bold;
}

#manualId{
  background:#fff;
}

#scanner-section > div:last-child{
  background:#f8fbff !important;
  border:1px solid var(--border);
  border-radius:18px !important;
}

footer{
  background:#fff;
  color:var(--text);
  text-align:center;
  padding:16px 12px;
  border-top:4px solid var(--yellow);
  font-size:12px;
}

footer p{
  margin:6px 0;
}

.social-icons a{
  color:#2f80ed;
  margin:0 8px;
  font-size:16px;
}
#login-section,
#scanner-section,
#mainView {
  display: none;
}
    
@media(max-width:768px){
  .header-right{
    padding:12px 8px;
    gap:8px;
  }

  .header-right img.logo{
    height:44px !important;
  }

  .divider{
    height:38px;
  }

  .arabic-name{
    font-size:15px;
  }

  .english-name{
    font-size:11px;
  }

  main{
    padding:14px 10px;
  }

  .container,
  #login-section{
    width:95% !important;
    padding:20px 14px !important;
    margin:18px auto !important;
  }

  button,input,select{
    width:92% !important;
    font-size:14px;
  }

  footer{
    font-size:11px;
  }
}
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="header-container">
      <div class="header-right">
        <img src="Picture3.png" alt="شعار الشارقة" class="logo">
        <div class="divider"></div>
        <img src="logo.png" alt="شعار نادي كلباء" class="logo">
        <div class="header-info">
          <div class="arabic-name">نادي كلباء الرياضي الثقافي</div>
          <div class="english-name">KALBA SPORTS & CULTURAL CLUB</div>
        </div>
      </div>
    </header>

    <main>

<div id="login-section" style="
  max-width: 400px;
  margin: 60px auto;
  background: rgba(0, 0, 0, 0.85);
  padding: 30px 20px;
  border-radius: 16px;
  border: 2px solid #f4e733;
  text-align: center;
">
  <h3 style="color: #f4e733; margin-bottom: 20px;">تسجيل الدخول</h3>
  <input type="text" id="username" placeholder="اسم المستخدم" style="width: 90%; margin-bottom: 10px;"><br>
  <input type="password" id="password" placeholder="كلمة المرور" style="width: 90%; margin-bottom: 15px;"><br>
  <button onclick="login()" style="width: 100%;">دخول</button>
  <div id="login-error" style="color: red; margin-top: 12px;"></div>
</div>
      
<div class="container" id="mainView">

      <div id="scanner-section">
        <button
  onclick="logout()"
  style="background:#d9534f;color:white;margin-top:20px;">
  تسجيل الخروج
</button>
        <h3>وجه الكاميرا نحو رمز QR الخاص بالطفل</h3>
        <button onclick="startScanner()"> بدء تشغيل الكاميرا</button>
        <div id="reader"></div>
        <div id="status">يرجى توجيه الكاميرا نحو رمز QR الخاص باللاعب</div>
        
<label for="activity">اختر النشاط (اختياري):</label>
<select id="activity" style="width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px;">
  <option value="عام"> الحضور العام</option>
  <option value="ورش">ورش</option>
  <option value="زيارات خارجية">زيارات خارجية</option>
  <option value="شطرنج">شطرنج</option>
  <option value="كرة قدم">كرة قدم</option>
  <option value="كرة سلة">كرة سلة</option>
  <option value="كرة طائرة">كرة طائرة</option>
  <option value="كرة يد">كرة يد</option>
  <option value="العاب ثقافية">العاب ثقافية</option>
  <option value="خماسي حديث">خماسي حديث</option>
  <option value="لياقة بدنية">لياقة بدنية</option>
  <option value=" ورش تطبيقية">ورش تطبيقية</option>
  <option value=" أنشطة بحرية">أنشطة بحرية</option>
  <option value=" ورش ذكاء اصطناعي">ورش ذكاء اصطناعي</option>
</select>
        
        <div style="margin-top: 25px; background: #000; padding: 15px 20px; border-radius: 12px;">
          <label for="manualId">أدخل رقم الطفل (مثال: 17197482 الرقم فقط):</label>
          <input type="text" id="manualId" placeholder="مثال: 17197482" style="width: 100%;">
          <button onclick="submitManual()">تسجيل يدوي</button>
        </div>
      </div>
        </div>

    </main>

    <footer>
      <p>© 2025 نادي كلباء الرياضي الثقافي - جميع الحقوق محفوظة</p>
      <p style="font-size: 12px; color: #aaa; margin-top: -10px;">تم التطوير بواسطة روند أحمد الضمور</p>
      <div class="social-icons">
        <a href="https://facebook.com/Kalbasc1" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="https://instagram.com/kalbasc" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://x.com/Kalba_sc" target="_blank"><i class="fab fa-twitter"></i></a>
        <a href="https://youtube.com/@kalbasc" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://tiktok.com/@kalbasc" target="_blank"><i class="fab fa-tiktok"></i></a>
      </div>
    </footer>
  </div>

  <script>
if (window.top === window.self) {
  window.location.replace("KSCsummer.html?page=AttendanceScan.html");
}
    
    const USERS = {
      "rwnd": "rwnd123",
      "eman": "eman123",
      "fatima": "fatima123",
      "amna": "amna123",
      "haneen": "haneen123"
    };

let loggedInUser = localStorage.getItem("attendanceUser");

if (loggedInUser) {
  document.getElementById("login-section").style.display = "none";
  document.getElementById("mainView").style.display = "grid";
  document.getElementById("scanner-section").style.display = "block";
} else {
  document.getElementById("login-section").style.display = "block";
  document.getElementById("mainView").style.display = "none";
  document.getElementById("scanner-section").style.display = "none";
}

    function login() {
      const u = document.getElementById("username").value.trim().toLowerCase();
      const p = document.getElementById("password").value.trim();
      if (USERS[u] && USERS[u] === p) {
        loggedInUser = u;
      localStorage.setItem("attendanceUser", u);
        document.getElementById("login-section").style.display = "none";
        document.getElementById("mainView").style.display = "grid";
        document.getElementById("scanner-section").style.display = "block";
      } else {
        document.getElementById("login-error").innerText = "اسم المستخدم أو كلمة المرور غير صحيحة.";
      }
    }

const REGISTRATION_SCRIPT =
"https://script.google.com/macros/s/AKfycbysWX_UMRpmi_wv316IUcihXjjDVE-bTNsXagOWCDF2EjM33VaFP5Ru9YZkhcdcyFhIZQ/exec";
   
async function markAttendance(code) {
  const parts = code.split("|");

  const id = parts[0] || "UNKNOWN";
  const encodedName = parts[1] || "UNKNOWN";
  const encodedParent = parts[2] || "UNKNOWN";

  let name = decodeURIComponent(encodedName);
  let parent = decodeURIComponent(encodedParent);

  try {
    const cleanId = id.replace("KalbaSC-", "");

    const res = await fetch(
      `${REGISTRATION_SCRIPT}?id=${encodeURIComponent(cleanId)}&v=${Date.now()}`
    );

    const fullData = await res.json();

    if (fullData.name) name = fullData.name;
    if (fullData.parent) parent = fullData.parent;
  } catch (err) {
    console.log("Could not fetch full parent name", err);
  }

  const timestamp = new Date().toISOString();
  const activity = document.getElementById("activity").value.trim();

  document.getElementById("status").innerHTML = `
    <div style="font-size:24px;font-weight:bold;color:#22c55e;">
      ✅ تم تسجيل الحضور
    </div>
    <br>
    الاسم: ${name}<br>
    ولي الأمر: ${parent}<br>
    المعرف: ${id}<br>
    النشاط: ${activity}<br>
    بواسطة: ${loggedInUser.toUpperCase()}
  `;

  const data = new URLSearchParams();
  data.append("id", id);
  data.append("name", name);
  data.append("parent", parent);
  data.append("timestamp", timestamp);
  data.append("staff", loggedInUser);
  data.append("activity", activity);

  fetch(
    "https://script.google.com/macros/s/AKfycbzJwZ7Ulx_pfSOsnpQ-fEicYnXPWsGB7b0k_pTrpglnkFXBPQpU-WEXV7VXYyIQkHh2nw/exec",
    {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: data
    }
  );

  setTimeout(() => {
    startScanner();
  }, 4000);
}

    const html5QrCode = new Html5Qrcode("reader");
const config = {
  fps: 10,
  qrbox: { width: 250, height: 250 },
  aspectRatio: 1.0,
  rememberLastUsedCamera: true,
  supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA],
  experimentalFeatures: {
    useBarCodeDetectorIfSupported: true
  },
    videoConstraints: {
    facingMode: "environment",
    advanced: [{ focusMode: "continuous" }] 
  }
};

    let scannerStarted = false;
    function startScanner() {
      if (scannerStarted) return;
      Html5Qrcode.getCameras().then(devices => {
        if (devices.length === 0) return alert("❌ لم يتم العثور على كاميرا.");
        const backCamera = devices.find(device =>
          device.label.toLowerCase().includes("back") || device.label.toLowerCase().includes("environment")) || devices[0];

        scannerStarted = true;
        html5QrCode.start(
          backCamera.id,
          config,
          msg => {
            html5QrCode.stop();
            scannerStarted = false;
            markAttendance(msg);
          },
          err => {}
        );
      }).catch(() => alert("⚠️ لم يتم السماح بالوصول إلى الكاميرا."));
    }

    function submitManual() {
      const input = document.getElementById("manualId").value.trim();
      if (!input) return alert("يرجى إدخال كود الطفل أو الرقم.");
      const match = input.match(/KalbaSC-(\d+)/) || input.match(/^(\d{6,})$/);
      if (!match) return alert("⚠️ يرجى إدخال الكود بالشكل الصحيح.");
      const idOnly = match[1];

      fetch(`https://script.google.com/macros/s/AKfycbysWX_UMRpmi_wv316IUcihXjjDVE-bTNsXagOWCDF2EjM33VaFP5Ru9YZkhcdcyFhIZQ/exec?id=${idOnly}`)
        .then(res => res.json())
        .then(data => {
          if (data.error) return alert("❌ لم يتم العثور على هذا الرقم.");
          const qr = `KalbaSC-${idOnly}|${encodeURIComponent(data.name)}|${encodeURIComponent(data.parent)}`;
          markAttendance(qr);
        })
        .catch(() => alert("⚠️ تعذر الاتصال بالخادم."));
    }

    function logout() {
  localStorage.removeItem("attendanceUser");
  location.reload();
}
  </script>
  
  <script>
(() => {
  const isEmbedded = new URLSearchParams(location.search).has('embed');
  if (isEmbedded) {
    const style = document.createElement('style');
    style.textContent = `
      header.header-container, .header-container, .footer-container, footer { display: none !important; }
      html, body { background: transparent !important; }
    `;
    document.head.appendChild(style);
  }

  const sendSize = () => {
    const b = document.body, e = document.documentElement;
    const h = Math.max(
      b.scrollHeight, b.offsetHeight, b.clientHeight,
      e.scrollHeight, e.offsetHeight, e.clientHeight
    );
    window.parent.postMessage({ type: 'kalba-iframe-size', height: h }, '*');
  };

  const mo = new MutationObserver(() => { sendSize(); });
  mo.observe(document.documentElement, { childList: true, subtree: true, attributes: true, characterData: true });

  window.addEventListener('load', sendSize, true);
  setTimeout(sendSize, 100);
  setTimeout(sendSize, 400);
  setTimeout(sendSize, 900);
})();
</script>

</body>
