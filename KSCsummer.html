<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نادي كلباء - لوحة موحدة</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    @font-face {
      font-family: 'NotoKufiArabic';
      src: url('NotoKufiArabic.ttf') format('truetype');
    }
    body {
      margin: 0;
      font-family: 'NotoKufiArabic', sans-serif;
      background: url('black_and_yellow_grunge_background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
    }
    .header-container, footer {
      background-color: #111;
      color: white;
      text-align: center;
      border-top: 3px solid #f4e733;
      border-bottom: 3px solid #f4e733;
      padding: 15px 10px;
    }
    .header-right {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }
    .logo {
      height: 50px;
    }
    .divider {
      width: 2px;
      height: 45px;
      background-color: #f4e733;
    }
    .arabic-name { font-weight: bold; font-size: 16px; }
    .english-name { font-size: 12px; color: #f4e733; }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      background: #000;
      border-bottom: 2px solid #f4e733;
    }
    nav button {
      background: none;
      border: none;
      color: #f4e733;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    nav button.active {
      background-color: #f4e733;
      color: black;
    }
    section { display: none; padding: 20px; }
    section.active { display: block; }
  </style>
</head>
<body>
  <header class="header-container">
    <div class="header-right">
      <img src="Picture3.png" class="logo">
      <div class="divider"></div>
      <img src="logo.png" class="logo">
      <div class="header-info">
        <div class="arabic-name">نادي كلباء الرياضي الثقافي</div>
        <div class="english-name">KALBA SPORTS & CULTURAL CLUB</div>
      </div>
    </div>
  </header>

  <nav>
    <button class="active" onclick="switchSection('scanner')">تسجيل الحضور</button>
    <button onclick="switchSection('reports')">لوحة التقارير</button>
    <button onclick="switchSection('evaluate')">تقييم اللاعبين</button>
    <button onclick="switchSection('camp')">تسجيل المخيم</button>
  </nav>

  <section id="scanner" class="active">
    <h2>تسجيل الحضور عبر QR</h2>
  </section>

  <section id="reports">
    <h2>التقارير</h2>
  </section>

  <section id="evaluate">
    <h2>تقييم اللاعبين</h2>
  </section>

  <section id="camp">
    <h2>تسجيل المخيم الصيفي</h2>
  </section>

  <footer>
    <p>© 2025 نادي كلباء الرياضي الثقافي - جميع الحقوق محفوظة</p>
    <p style="font-size: 12px; color: #aaa">تم التطوير بواسطة روند أحمد الضمور</p>
  </footer>

  <script>
    function switchSection(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
