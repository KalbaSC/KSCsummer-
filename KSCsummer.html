<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>نادي كلباء الرياضي الثقافي - الصفحة الرئيسية</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
   @font-face {
      font-family: 'NotoKufiArabic';
      src: url('NotoKufiArabic.ttf') format('truetype'); 
      font-display: swap;
    }
    :root {
      --brand: #f4e733;
      --bg-dark: #111;
      --bg-black: #000;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'NotoKufiArabic', 'Cairo', system-ui, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #000;
      background-image: url('black_and_yellow_grunge_background.jpg');
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
      background-size: cover;
    }

    .header-container {
      width: 100%;
      background: var(--bg-dark);
      border-bottom: 3px solid var(--brand);
    }
    .header-right {
      width: 100%;
      max-width: 1170px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px 42px;
      background-color: var(--bg-dark);
      color: white;
      box-sizing: border-box;
    }
    .header-right img.logo { height: 70px; }
    .divider { width: 1.5px; height: 65px; background-color: var(--brand); }
    .header-info { text-align: center; }
    .arabic-name { font-weight: bold; font-size: 20px; }
    .english-name { font-size: 14px; color: var(--brand); }

    nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: var(--bg-black);
      border-bottom: 2px solid var(--brand);
    }
    nav button {
      background: none;
      border: none;
      color: var(--brand);
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    nav button.active {
      background: var(--brand);
      color: #000;
      border-radius: 8px;
    }

    main {
      flex: 1; 
      width: 100%;
      box-sizing: border-box;
    }
    #pageFrame {
      width: 100%;
      border: 0;
      display: block;
      background: transparent; 
      min-height: 420px; 
      transform: translateZ(0);
    }

    footer {
      background-color: var(--bg-dark);
      color: white;
      text-align: center;
      padding: 18px 12px;
      border-top: 3px solid var(--brand);
      font-size: 14px;
      line-height: 1.4;
    }
    .social-icons a {
      color: white;
      margin: 0 8px;
      font-size: 18px;
    }

.dropdown{
  position:relative;
}

.dropdown-btn{
  background:none;
  border:none;
  color:var(--brand);
  padding:12px 18px;
  cursor:pointer;
  font-size:16px;
}

.dropdown-content{
  display:none;
  position:absolute;
  right:0;
  top:100%;
  min-width:240px;
  background:#111;
  border:2px solid var(--brand);
  border-radius:12px;
  overflow:hidden;
  z-index:999;
}

.dropdown-content button{
  width:100%;
  text-align:right;
  background:#111;
  color:white;
  border:none;
  padding:14px 18px;
  cursor:pointer;
}

.dropdown-content button:hover{
  background:var(--brand);
  color:#000;
}

.dropdown.open .dropdown-content{
  display:block;
}

.mobile-menu-btn{
  display:none;
}

@media(max-width:768px){
  body{
    background-attachment:scroll;
    overflow-x:hidden;
  }

  .header-right{
    padding:10px 8px;
    gap:8px;
  }

  .header-right img.logo{
    height:44px !important;
  }

  .divider{
    height:38px;
  }

  .arabic-name{
    font-size:15px;
  }

  .english-name{
    font-size:11px;
  }

.mobile-menu-btn{
  display:block;
  width:82%;
  max-width:340px;
  margin:10px auto 8px;
  padding:10px 14px;
  border:1px solid rgba(244,231,51,.8);
  border-radius:14px;
  background:linear-gradient(135deg,#f4e733,#fff36a);
  color:#000;
  font-size:15px;
  font-weight:bold;
  font-family:'NotoKufiArabic',sans-serif;
  box-shadow:0 6px 18px rgba(244,231,51,.18);
}

  nav{
    display:none;
    width:82%;
    max-width:340px;
    margin:0 auto 10px;
    padding:10px;
    background:rgba(0,0,0,.94);
    border:1px solid var(--brand);
    border-radius:18px;
  }

  nav.show{
    display:block;
  }

  nav button,
  .dropdown-btn{
    display:block;
    width:100%;
    margin:7px 0;
    padding:13px;
    border-radius:14px;
    background:#151515;
    color:var(--brand);
    font-size:14px;
    text-align:center;
  }

  nav button.active{
    background:var(--brand);
    color:#000;
  }

  .dropdown{
    width:100%;
  }

  .dropdown-content{
    position:static;
    display:none;
    width:100%;
    border:1px solid var(--brand);
    border-radius:14px;
    margin-top:8px;
    background:#080808;
  }

  .dropdown.open .dropdown-content{
    display:block;
  }

  .dropdown-content button{
    text-align:center;
    background:#222;
    color:#fff;
  }

  #pageFrame{
    min-height:0px;
  }

  footer{
    font-size:11px;
    padding:10px;
  }
}
  </style>
</head>
<body>

  <header class="header-container">
    <div class="header-right">
      <img src="Picture3.png" alt="شعار الشارقة" class="logo">
      <div class="divider"></div>
      <img src="logo.png" alt="شعار نادي كلباء" class="logo">
      <div class="header-info">
        <div class="arabic-name">نادي كلباء الرياضي الثقافي</div>
        <div class="english-name">KALBA SPORTS & CULTURAL CLUB</div>
      </div>
    </div>
  </header>

<button class="mobile-menu-btn" onclick="toggleMobileMenu()">
  ☰ القائمة
</button>
  
<nav id="mainNav">
    <button class="active" onclick="loadPage(this, 'AttendanceScan.html')">📷 تسجيل الحضور</button>
    <button onclick="loadPage(this, 'reports.html')">📊 لوحة التقارير</button>
    <button onclick="loadPage(this, 'evaluate.html')">📝 تقييم اللاعبين</button>
    <button onclick="loadPage(this, 'camp.html')">🧒 تسجيل المخيم</button>
    <button onclick="loadPage(this, 'gallery.html')">🖼️ المركز الإعلامي</button>
<div class="dropdown">

<button class="dropdown-btn" onclick="toggleAdminMenu(event)">
  ⚙️ صفحات الإدارة ▾
</button>

  <div class="dropdown-content">
    <button onclick="loadPage(this,'weeklyReports.html')">
      📄 التقارير الأسبوعية
    </button>

    <button onclick="loadPage(this,'campPortal.html')">
      💰 حسابات المعسكر
    </button>
  </div>

</div>
  </nav>
  
  <main>
    <iframe
      id="pageFrame"
      src="AttendanceScan.html?embed=1"
      sandbox="allow-scripts allow-forms allow-modals allow-popups allow-same-origin allow-popups-to-escape-sandbox"
      allow="camera *; microphone *; clipboard-read *; clipboard-write *"
      style="width:100%; border:0; display:block; background:transparent; min-height:420px;"
      title="Club Module"
    ></iframe>
  </main>

  <footer>
    <p>© 2025 نادي كلباء الرياضي الثقافي - جميع الحقوق محفوظة</p>
    <p style="font-size: 12px; color: #aaa;">تم التطوير بواسطة روند أحمد الضمور</p>
    <div class="social-icons">
      <a href="https://facebook.com/Kalbasc1" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://instagram.com/kalbasc" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://x.com/Kalba_sc" target="_blank"><i class="fab fa-twitter"></i></a>
      <a href="https://youtube.com/@kalbasc" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>
  </footer>
  
  <script>
  function setActive(btn) {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function loadPage(btn, page) {
    setActive(btn);
    const frame = document.getElementById('pageFrame');
    const hasQuery = page.includes('?');
    const withEmbed = page.includes('?')
  ? page + '&embed=1'
  : page + '?embed=1';
    const bust = (withEmbed.includes('?') ? '&' : '?') + 'v=' + Date.now();
    frame.src = withEmbed + bust;
    document.getElementById('mainNav').classList.remove('show');
   document.querySelectorAll('.dropdown.open')
  .forEach(d => d.classList.remove('open')); 
  }

window.addEventListener('message', (e) => {
  if (!e.data) return;

  if (e.data.type === 'go-to-page') {
    const targetBtn = [...document.querySelectorAll('nav button')]
      .find(btn => btn.getAttribute('onclick')?.includes(e.data.page));

    if (targetBtn) {
      loadPage(targetBtn, e.data.page);
    }
  }

  if (e.data.type === 'kalba-iframe-size') {
    const frame = document.getElementById('pageFrame');

    const newHeight = e.data.height + 2;
    const currentHeight = parseInt(frame.style.height || frame.offsetHeight || 0);

    if (Math.abs(newHeight - currentHeight) > 80) {
      frame.style.height = newHeight + 'px';
    }
  }

  if (e.data.type === 'open-drive-file') {
    window.open(e.data.url, '_blank');
  }
});

document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const page = params.get("page");

  if (page) {
    const targetBtn = [...document.querySelectorAll('nav button')]
      .find(btn => btn.getAttribute('onclick')?.includes(page));

    if (targetBtn) {
      loadPage(targetBtn, page);
      return;
    }
  }

  const firstBtn = document.querySelector('nav button.active');
  loadPage(firstBtn, 'AttendanceScan.html');
});

function toggleAdminMenu(event){
  event.stopPropagation();
  event.currentTarget.closest('.dropdown').classList.toggle('open');
}

document.addEventListener('click', () => {
  document.querySelectorAll('.dropdown.open')
    .forEach(d => d.classList.remove('open'));
});
function toggleMobileMenu(){
  document.getElementById('mainNav').classList.toggle('show');
}    
</script>
 
</body>
</html>
