<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نادي كلباء الرياضي الثقافي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'NotoKufiArabic', sans-serif;
      background: url('black_and_yellow_grunge_background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
    }
    .header-container {
      width: 100%;
      background: #111;
      border-bottom: 3px solid #f4e733;
    }
    .header-right {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }
    .logo { height: 60px; }
    .divider { width: 2px; height: 50px; background-color: #f4e733; }
    .arabic-name { font-weight: bold; font-size: 20px; }
    .english-name { font-size: 14px; color: #f4e733; }
    nav {
      display: flex;
      justify-content: center;
      background: #000;
      border-bottom: 2px solid #f4e733;
    }
    nav button {
      background: none;
      border: none;
      color: #f4e733;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    nav button:hover {
      background: #f4e733;
      color: black;
    }
    iframe {
      width: 100%;
      height: calc(100vh - 220px);
      border: none;
      background: white;
    }
    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 15px;
      border-top: 3px solid #f4e733;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header-container">
    <div class="header-right">
      <img src="Picture3.png" class="logo">
      <div class="divider"></div>
      <img src="logo.png" class="logo">
      <div>
        <div class="arabic-name">نادي كلباء الرياضي الثقافي</div>
        <div class="english-name">KALBA SPORTS & CULTURAL CLUB</div>
      </div>
    </div>
  </header>

  <nav>
    <button onclick="loadPage('camp.html')">🧒 تسجيل المخيم</button>
    <button onclick="loadPage('AttendanceScan.html')">📷 تسجيل الحضور</button>
    <button onclick="loadPage('evaluate.html')">📝 تقييم اللاعبين</button>
    <button onclick="loadPage('reports.html')">📊 لوحة التقارير</button>
  </nav>

  <iframe id="pageFrame" src="AttendanceScan.html"></iframe>

  <footer>
    <p>© 2025 نادي كلباء الرياضي الثقافي - جميع الحقوق محفوظة</p>
    <p style="font-size: 12px; color: #aaa;">تم التطوير بواسطة روند أحمد الضمور</p>
    <div>
      <a href="https://facebook.com/Kalbasc1" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://instagram.com/kalbasc" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://x.com/Kalba_sc" target="_blank"><i class="fab fa-twitter"></i></a>
      <a href="https://youtube.com/@kalbasc" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>
  </footer>

  <script>
    function loadPage(page) {
      document.getElementById('pageFrame').src = page;
    }
  </script>

</body>
</html>
