<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head> 
  <meta charset="UTF-8" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>نادي كلباء الرياضي الثقافي - الصفحة الرئيسية</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
@font-face {
  font-family: 'NotoKufiArabic';
  src: url('NotoKufiArabic.ttf') format('truetype');
  font-display: swap;
}

:root {
  --brand: #f4e733;
  --brand-soft: #fff8c9;
  --sky: #eaf7ff;
  --blue: #2f80ed;
  --green: #22c55e;
  --text: #1f2937;
  --muted: #6b7280;
  --card: #ffffff;
  --border: #e5e7eb;
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'NotoKufiArabic', 'Cairo', system-ui, sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background:
    radial-gradient(circle at top right, #fff8c9 0, transparent 32%),
    linear-gradient(135deg, #f5fbff 0%, #ffffff 45%, #eef8ff 100%);
}

/* Header */
.header-container {
  width: 100%;
  background: linear-gradient(135deg, #ffffff, #fffbe3);
  border-bottom: 5px solid var(--brand);
  box-shadow: 0 8px 25px rgba(47, 128, 237, 0.08);
}

.header-right {
  width: 100%;
  max-width: 1170px;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 20px 42px;
  color: var(--text);
}

.header-right img.logo {
  height: 70px;
}

.divider {
  width: 4px;
  height: 65px;
  background: var(--brand);
  border-radius: 20px;
}

.header-info {
  text-align: center;
}

.arabic-name {
  font-weight: bold;
  font-size: 22px;
  color: var(--text);
}

.english-name {
  font-size: 14px;
  color: var(--blue);
  font-weight: 600;
}

/* Navigation */
nav {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  width: 94%;
  max-width: 1450px;
  margin: 18px auto;
  padding: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: 0 12px 30px rgba(47, 128, 237, 0.12);
}

nav button,
.dropdown-btn {
  background: #ffffff;
  border: 1px solid #dbeafe;
  color: var(--text);
  padding: 12px 18px;
  font-size: 15px;
  cursor: pointer;
  border-radius: 16px;
  font-family: 'NotoKufiArabic', sans-serif;
  transition: 0.2s ease;
}

nav button:hover,
.dropdown-btn:hover {
  background: var(--sky);
  transform: translateY(-2px);
}

nav button.active {
  background: var(--brand);
  color: #222;
  border-color: var(--brand);
  font-weight: bold;
  box-shadow: 0 8px 20px rgba(244, 231, 51, 0.35);
}

/* Dropdown */
.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  right: 0;
  top: 110%;
  min-width: 250px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  z-index: 999;
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
}

.dropdown-content button {
  width: 100%;
  text-align: right;
  background: white;
  color: var(--text);
  border: none;
  padding: 14px 18px;
  cursor: pointer;
  border-radius: 0;
}

.dropdown-content button:hover {
  background: var(--sky);
  transform: none;
}

.dropdown.open .dropdown-content {
  display: block;
}

/* Main iframe */
main {
  flex: 1;
  width: 100%;
  padding: 0 22px 25px;
}

#pageFrame {
  width: 100%;
  border: 0;
  display: block;
  background: white;
  min-height: 420px;
  border-radius: 26px;
  box-shadow: 0 15px 40px rgba(47, 128, 237, 0.12);
  transform: translateZ(0);
}

/* Footer */
footer {
  background: white;
  color: var(--text);
  text-align: center;
  padding: 18px 12px;
  border-top: 5px solid var(--brand);
  font-size: 14px;
  line-height: 1.4;
  box-shadow: 0 -8px 25px rgba(47, 128, 237, 0.08);
}

footer p {
  margin: 6px 0;
}

.social-icons a {
  color: var(--blue);
  margin: 0 8px;
  font-size: 18px;
  transition: 0.2s;
}

.social-icons a:hover {
  color: #1d4ed8;
}

/* Mobile menu */
.mobile-menu-btn {
  display: none;
}

/* Mobile */
@media(max-width:768px) {
  body {
    overflow-x: hidden;
  }

  .header-right {
    padding: 12px 8px;
    gap: 8px;
  }

  .header-right img.logo {
    height: 44px !important;
  }

  .divider {
    height: 38px;
    width: 3px;
  }

  .arabic-name {
    font-size: 15px;
  }

  .english-name {
    font-size: 11px;
  }

  .mobile-menu-btn {
    display: block;
    width: 86%;
    max-width: 350px;
    margin: 12px auto 8px;
    padding: 12px 14px;
    border: none;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--brand), #fff176);
    color: #222;
    font-size: 15px;
    font-weight: bold;
    font-family: 'NotoKufiArabic', sans-serif;
    box-shadow: 0 8px 20px rgba(244, 231, 51, 0.3);
  }

  nav {
    display: none;
    width: 88%;
    max-width: 360px;
    margin: 0 auto 12px;
    padding: 12px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: 0 10px 25px rgba(47, 128, 237, 0.14);
  }

  nav.show {
    display: block;
  }

  nav button,
  .dropdown-btn {
    display: block;
    width: 100%;
    margin: 7px 0;
    padding: 13px;
    border-radius: 16px;
    background: #f8fbff;
    color: var(--text);
    font-size: 14px;
    text-align: center;
    border: 1px solid #dbeafe;
  }

  nav button.active {
    background: var(--brand);
    color: #222;
  }

  .dropdown {
    width: 100%;
  }

  .dropdown-content {
    position: static;
    display: none;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-top: 8px;
    background: #ffffff;
    box-shadow: none;
  }

  .dropdown.open .dropdown-content {
    display: block;
  }

  .dropdown-content button {
    text-align: center;
    background: #f8fbff;
    color: var(--text);
  }

  main {
    padding: 0 10px 15px;
  }

  #pageFrame {
    min-height: 0;
    border-radius: 20px;
  }

  footer {
    font-size: 11px;
    padding: 12px;
  }

  .social-icons a {
    font-size: 16px;
  }
}
  </style>
</head>
<body>

  <header class="header-container">
    <div class="header-right">
      <img src="Picture3.png" alt="شعار الشارقة" class="logo">
      <div class="divider"></div>
      <img src="logo.png" alt="شعار نادي كلباء" class="logo">
      <div class="header-info">
        <div class="arabic-name">نادي كلباء الرياضي الثقافي</div>
        <div class="english-name">KALBA SPORTS & CULTURAL CLUB</div>
      </div>
    </div>
  </header>

<button class="mobile-menu-btn" onclick="toggleMobileMenu()">
  ☰ القائمة
</button>
  
<nav id="mainNav">
    <button class="active" onclick="loadPage(this, 'AttendanceScan.html')">📷 تسجيل الحضور</button>
    <button onclick="loadPage(this, 'reports.html')">📊 لوحة التقارير</button>
    <button onclick="loadPage(this, 'evaluate.html')">📝 تقييم اللاعبين</button>
    <button onclick="loadPage(this, 'camp.html')">🧒 تسجيل المخيم</button>
    <button onclick="loadPage(this, 'gallery.html')">🖼️ المركز الإعلامي</button>
    <button onclick="loadPage(this, 'parentFeedback.html')">رضا أولياء الأمور</button>
  <button onclick="loadPage(this, 'departureReport.html')">🚪 تقرير الخروج</button>
<div class="dropdown">

<button class="dropdown-btn" onclick="toggleAdminMenu(event)">
  ⚙️ صفحات الإدارة ▾
</button>

  <div class="dropdown-content">
    <button onclick="loadPage(this,'weeklyReports.html')">
      📄 التقارير الأسبوعية
    </button>

    <button onclick="loadPage(this,'campPortal.html')">
      💰 حسابات المعسكر
    </button>
  </div>

</div>
  </nav>
  
  <main>
    <iframe
      id="pageFrame"
      src="AttendanceScan.html?embed=1"
      sandbox="allow-scripts allow-forms allow-modals allow-popups allow-same-origin allow-popups-to-escape-sandbox"
      allow="camera *; microphone *; clipboard-read *; clipboard-write *"
      style="width:100%; border:0; display:block; background:transparent; min-height:420px;"
      title="Club Module"
    ></iframe>
  </main>

  <footer>
    <p>© 2025 نادي كلباء الرياضي الثقافي - جميع الحقوق محفوظة</p>
    <p style="font-size: 12px; color: #aaa;">تم التطوير بواسطة روند أحمد الضمور</p>
    <div class="social-icons">
      <a href="https://facebook.com/Kalbasc1" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://instagram.com/kalbasc" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://x.com/Kalba_sc" target="_blank"><i class="fab fa-twitter"></i></a>
      <a href="https://youtube.com/@kalbasc" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>
  </footer>
  
  <script>
  function setActive(btn) {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function loadPage(btn, page) {
    setActive(btn);
    const frame = document.getElementById('pageFrame');
    const hasQuery = page.includes('?');
    const withEmbed = page.includes('?')
  ? page + '&embed=1'
  : page + '?embed=1';
    const bust = (withEmbed.includes('?') ? '&' : '?') + 'v=' + Date.now();
    frame.src = withEmbed + bust;
    document.getElementById('mainNav').classList.remove('show');
   document.querySelectorAll('.dropdown.open')
  .forEach(d => d.classList.remove('open')); 
  }

window.addEventListener('message', (e) => {
  if (!e.data) return;

  if (e.data.type === 'go-to-page') {
    const targetBtn = [...document.querySelectorAll('nav button')]
      .find(btn => btn.getAttribute('onclick')?.includes(e.data.page));

    if (targetBtn) {
      loadPage(targetBtn, e.data.page);
    }
  }

  if (e.data.type === 'kalba-iframe-size') {
    const frame = document.getElementById('pageFrame');

    const newHeight = e.data.height + 2;
    const currentHeight = parseInt(frame.style.height || frame.offsetHeight || 0);

    if (Math.abs(newHeight - currentHeight) > 80) {
      frame.style.height = newHeight + 'px';
    }
  }

  if (e.data.type === 'open-drive-file') {
    window.open(e.data.url, '_blank');
  }
});

function initializePortal() {
  const params = new URLSearchParams(location.search);
  const page = params.get("page");

  if (page) {
    const targetBtn = [...document.querySelectorAll('nav button')]
      .find(btn => btn.getAttribute('onclick')?.includes(page));

    if (targetBtn) {
      loadPage(targetBtn, page);
      return;
    }
  }

  const firstBtn = document.querySelector('nav button.active');
  loadPage(firstBtn, 'AttendanceScan.html');
}

document.addEventListener("DOMContentLoaded", initializePortal);
window.addEventListener("pageshow", initializePortal);

window.addEventListener("pageshow", function (e) {
    const frame = document.getElementById("pageFrame");

    if (e.persisted && frame) {
        frame.src = frame.src.split("&v=")[0] + "&v=" + Date.now();
    }
});    

function toggleAdminMenu(event){
  event.stopPropagation();
  event.currentTarget.closest('.dropdown').classList.toggle('open');
}

document.addEventListener('click', () => {
  document.querySelectorAll('.dropdown.open')
    .forEach(d => d.classList.remove('open'));
});
function toggleMobileMenu(){
  document.getElementById('mainNav').classList.toggle('show');
}    
</script>
 
</body>
</html>
