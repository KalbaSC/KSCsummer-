<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="mobile-web-app-capable" content="yes"> 
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>نادي كلباء الرياضي الثقافي - الصفحة الرئيسية</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
   @font-face {
      font-family: 'NotoKufiArabic';
      src: url('NotoKufiArabic.ttf') format('truetype'); 
      font-display: swap;
    }
    :root {
      --brand: #f4e733;
      --bg-dark: #111;
      --bg-black: #000;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'NotoKufiArabic', 'Cairo', system-ui, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #000;
      background-image: url('black_and_yellow_grunge_background.jpg');
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
      background-size: cover;
    }

    .header-container {
      width: 100%;
      background: var(--bg-dark);
      border-bottom: 3px solid var(--brand);
    }
    .header-right {
      width: 100%;
      max-width: 1170px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px 42px;
      background-color: var(--bg-dark);
      color: white;
      box-sizing: border-box;
    }
    .header-right img.logo { height: 70px; }
    .divider { width: 1.5px; height: 65px; background-color: var(--brand); }
    .header-info { text-align: center; }
    .arabic-name { font-weight: bold; font-size: 20px; }
    .english-name { font-size: 14px; color: var(--brand); }

    nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: var(--bg-black);
      border-bottom: 2px solid var(--brand);
    }
    nav button {
      background: none;
      border: none;
      color: var(--brand);
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    nav button.active {
      background: var(--brand);
      color: #000;
      border-radius: 8px;
    }

    main {
      flex: 1; 
      width: 100%;
      box-sizing: border-box;
    }
    #pageFrame {
      width: 100%;
      border: 0;
      display: block;
      background: transparent; 
      min-height: 420px; 
      transform: translateZ(0);
    }

    footer {
      background-color: var(--bg-dark);
      color: white;
      text-align: center;
      padding: 18px 12px;
      border-top: 3px solid var(--brand);
      font-size: 14px;
      line-height: 1.4;
    }
    .social-icons a {
      color: white;
      margin: 0 8px;
      font-size: 18px;
    }

    @media (max-width: 768px) {
      .header-right { padding: 10px 10px; gap: 10px; }
      .header-right img.logo { height: 48px !important; max-height: 48px !important; }
      .divider { height: 42px; }
      .arabic-name { font-size: 16px; }
      .english-name { font-size: 12px; }

      nav button { padding: 10px 12px; font-size: 14px; }

      footer { padding: 12px 10px; font-size: 12px; }
      .social-icons a { font-size: 16px; }
    }

    @media (max-width: 420px) {
      .arabic-name { font-size: 15px; }
      .english-name { font-size: 11px; }
      nav button { font-size: 13px; }
      footer { font-size: 11px; }
    }
  </style>
</head>
<body>

  <header class="header-container">
    <div class="header-right">
      <img src="Picture3.png" alt="شعار الشارقة" class="logo">
      <div class="divider"></div>
      <img src="logo.png" alt="شعار نادي كلباء" class="logo">
      <div class="header-info">
        <div class="arabic-name">نادي كلباء الرياضي الثقافي</div>
        <div class="english-name">KALBA SPORTS & CULTURAL CLUB</div>
      </div>
    </div>
  </header>

  <nav>
    <button class="active" onclick="loadPage(this, 'AttendanceScan.html')">📷 تسجيل الحضور</button>
    <button onclick="loadPage(this, 'reports.html')">📊 لوحة التقارير</button>
    <button onclick="loadPage(this, 'evaluate.html')">📝 تقييم اللاعبين</button>
    <button onclick="loadPage(this, 'camp.html')">🧒 تسجيل المخيم</button>
  </nav>
  
  <main>
    <iframe
      id="pageFrame"
      src="AttendanceScan.html?embed=1"
      sandbox="allow-scripts allow-forms allow-modals allow-popups"
      allow="camera *; microphone *; clipboard-read *; clipboard-write *"
      style="width:100%; border:0; display:block; background:transparent; min-height:420px;"
      title="Club Module"
    ></iframe>
  </main>

  <footer>
    <p>© 2025 نادي كلباء الرياضي الثقافي - جميع الحقوق محفوظة</p>
    <p style="font-size: 12px; color: #aaa;">تم التطوير بواسطة روند أحمد الضمور</p>
    <div class="social-icons">
      <a href="https://facebook.com/Kalbasc1" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://instagram.com/kalbasc" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://x.com/Kalba_sc" target="_blank"><i class="fab fa-twitter"></i></a>
      <a href="https://youtube.com/@kalbasc" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>
  </footer>
  
  <script>
  function setActive(btn) {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function loadPage(btn, page) {
    setActive(btn);
    const frame = document.getElementById('pageFrame');
    const hasQuery = page.includes('?');
    const withEmbed = hasQuery ? page : page + '?embed=1';
    const bust = (withEmbed.includes('?') ? '&' : '?') + 'v=' + Date.now();
    frame.src = withEmbed + bust;
  }

  window.addEventListener('message', (e) => {
    if (!e.data || e.data.type !== 'kalba-iframe-size') return;
    const frame = document.getElementById('pageFrame');
    frame.style.height = (e.data.height + 2) + 'px';
  });

  document.addEventListener('DOMContentLoaded', () => {
    const firstBtn = document.querySelector('nav button.active');
    loadPage(firstBtn, 'AttendanceScan.html');
  });
</script>
 
</body>
</html>
