  const idPattern = /^784\d{12}$/;

  if (!idPattern.test(id)) {
    alert("⚠️ رقم الهوية غير صحيح. يجب أن يبدأ بـ 784 ويتكون من 15 رقمًا.");
    this.value = "";
    return;
  }

  try {
    const res = await fetch(`${LOOKUP_URL}?id=${encodeURIComponent(id)}`);
    const data = await res.json();

    if (data.error) {
      alert("لم يتم العثور على البيانات لهذا الرقم.");
      clearAutoFields();
      return;
    }

    document.getElementById('name').value = data.name || "";
    document.getElementById('age').value = String(data.age || "").replace(/[^\d]/g, "");
    document.getElementById('parent').value = data.parent || "";
    document.getElementById('phone').value = data.phone || "";
    document.getElementById('altPhone').value = data.parentPhone || "";
    document.getElementById('email').value = data.email || "";

  } catch (err) {
    console.error(err);
    alert("حدث خطأ أثناء جلب البيانات.");
  }
});

function clearAutoFields(){
  document.getElementById('name').value = "";
  document.getElementById('age').value = "";
  document.getElementById('parent').value = "";
  document.getElementById('phone').value = "";
  document.getElementById('altPhone').value = "";
}
</script>

(() => {
  const isEmbedded = new URLSearchParams(location.search).has('embed');
  if (isEmbedded) {
    const style = document.createElement('style');
    style.textContent = `
      header.header-container, .header-container, .footer-container, footer { display: none !important; }
      html, body { background: transparent !important; }
    `;
    document.head.appendChild(style);
  }

  const sendSize = () => {
    const b = document.body, e = document.documentElement;
    const h = Math.max(
      b.scrollHeight, b.offsetHeight, b.clientHeight,
      e.scrollHeight, e.offsetHeight, e.clientHeight
    );
    window.parent.postMessage({ type: 'kalba-iframe-size', height: h }, '*');
  };

  const mo = new MutationObserver(() => { sendSize(); });
  mo.observe(document.documentElement, { childList: true, subtree: true, attributes: true, characterData: true });

  window.addEventListener('load', sendSize, true);
  setTimeout(sendSize, 100);
  setTimeout(sendSize, 400);
  setTimeout(sendSize, 900);
})();
</script>
