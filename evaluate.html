<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="نادي كلباء الرياضي الثقافي">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180x180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167x167.png">
  <title>نادي كلباء الرياضي الثقافي - لوحة التقييم</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">  
  <style>
@font-face {
  font-family: 'NotoKufiArabic';
  src: url('NotoKufiArabic.ttf') format('truetype');
  font-display: swap;
}

:root {
  --primary: #0b3551;
  --primary-light: #174f73;
  --blue: #2f80ed;
  --accent: #f4e733;
  --accent-hover: #e4d824;
  --background: #eef6f8;
  --surface: #ffffff;
  --surface-soft: #f7fbfd;
  --text: #1f2937;
  --muted: #6b7280;
  --border: #dfe7ec;
  --success: #22a65a;
  --success-soft: #ecfdf3;
  --danger: #dc3545;
  --danger-soft: #fff1f2;
  --shadow: 0 14px 36px rgba(11, 53, 81, 0.09);
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  -webkit-text-size-adjust: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  padding: 0;
  font-family: 'NotoKufiArabic', Arial, sans-serif;
  background:
    radial-gradient(circle at top right, rgba(244, 231, 51, 0.18), transparent 28%),
    linear-gradient(135deg, #eef6f8 0%, #f8fbfc 55%, #edf6fa 100%);
  color: var(--text);
}

/* Header */

.header-container {
  width: 100%;
  position: relative;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 3px 16px rgba(11, 53, 81, 0.06);
}

.header-content {
  width: 100%;
  max-width: 1450px;
  margin: auto;
}

.header-right {
  width: 100%;
  max-width: 1450px;
  margin: auto;
  padding: 17px 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 17px;
  color: var(--text);
}

.header-right img.logo {
  width: auto;
  height: 64px;
  object-fit: contain;
}

.divider {
  width: 3px;
  height: 58px;
  flex-shrink: 0;
  border-radius: 20px;
  background: var(--accent);
}

.header-info {
  text-align: center;
}

.arabic-name {
  color: var(--primary);
  font-size: 21px;
  font-weight: 800;
}

.english-name {
  margin-top: 2px;
  color: var(--blue);
  font-size: 13px;
  font-weight: 600;
}

/* Login */

.login-container {
  width: calc(100% - 28px);
  max-width: 470px;
  margin: 55px auto;
  padding: 36px 32px;
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 26px;
  box-shadow: var(--shadow);
}

.login-container::before {
  content: "\f51c";
  display: flex;
  width: 72px;
  height: 72px;
  margin: 0 auto 18px;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: #eef6fb;
  color: var(--primary);
  font-family: "Font Awesome 6 Free";
  font-size: 30px;
  font-weight: 900;
}

.login-container h2 {
  margin: 0 0 26px;
  color: var(--primary);
  font-size: 25px;
}

.form-group {
  margin-bottom: 18px;
  text-align: right;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  color: var(--primary);
  font-size: 14px;
  font-weight: 700;
}

.form-group input,
.form-group select,
textarea,
#playerSelect,
#activityFilter {
  width: 100%;
  min-height: 46px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 13px;
  outline: none;
  background: var(--surface-soft);
  color: var(--text);
  font-family: 'NotoKufiArabic', Arial, sans-serif;
  font-size: 14px;
  transition: 0.2s ease;
}

.form-group input:focus,
.form-group select:focus,
textarea:focus,
#playerSelect:focus,
#activityFilter:focus {
  border-color: var(--blue);
  background: var(--surface);
  box-shadow: 0 0 0 4px rgba(47, 128, 237, 0.11);
}

textarea {
  min-height: 110px;
  margin-top: 16px;
  resize: vertical;
}

.remember-me {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 9px;
  margin-top: 5px;
}

.remember-me input[type="checkbox"] {
  width: 18px;
  min-height: auto;
  height: 18px;
  margin: 0;
  accent-color: var(--primary);
}

.remember-me label {
  margin: 0;
  color: var(--muted) !important;
  font-size: 13px;
}

/* Buttons */

.btn {
  padding: 12px 20px;
  margin: 5px;
  border: 0;
  border-radius: 13px;
  background: var(--accent);
  color: #222;
  font-family: 'NotoKufiArabic', Arial, sans-serif;
  font-weight: 800;
  cursor: pointer;
  transition: 0.2s ease;
}

.btn:hover {
  transform: translateY(-2px);
  background: var(--accent-hover);
  box-shadow: 0 8px 18px rgba(244, 231, 51, 0.3);
}

.btn:active {
  transform: translateY(0);
}

.btn-block {
  display: block;
  width: 100%;
  margin: 20px 0 0;
}

/* Main portal */

.container {
  width: calc(100% - 36px);
  max-width: 1450px;
  margin: 25px auto;
  padding: 26px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 26px;
  box-shadow: var(--shadow);
}

.hidden {
  display: none !important;
}

/* Welcome */

.welcome-banner {
  max-width: 760px;
  margin: 0 auto 22px;
  padding: 19px 24px;
  text-align: center;
  color: var(--primary);
  font-size: 17px;
  font-weight: 700;
  background:
    linear-gradient(135deg, #fffdeb, #f3faff);
  border: 1px solid #ebdf8a;
  border-radius: 18px;
  box-shadow: none;
  animation: fadeIn 0.5s ease;
}

.welcome-banner span,
.welcome-banner strong {
  color: var(--primary);
}

/* Portal navigation */

.nav-tabs {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 9px;
  margin-bottom: 24px;
  padding: 10px;
  background: var(--surface-soft);
  border: 1px solid var(--border);
  border-radius: 18px;
}

.nav-tabs button {
  min-height: 43px;
  padding: 10px 17px;
  border: 1px solid transparent;
  border-radius: 12px;
  background: transparent;
  color: #52616c;
  font-family: 'NotoKufiArabic', Arial, sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s ease;
}

.nav-tabs button:hover {
  background: #eaf5fb;
  color: var(--primary);
}

.nav-tabs button.active {
  background: var(--accent);
  color: #222;
  border-color: var(--accent);
  box-shadow: 0 6px 16px rgba(244, 231, 51, 0.28);
}

.nav-tabs button:last-child {
  color: var(--danger);
}

.nav-tabs button:last-child:hover {
  background: var(--danger-soft);
}

/* Player count and date tools */

#playersCount {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 14px;
  color: var(--primary);
  background: #eaf5fb;
  border: 1px solid #cee3f0;
  border-radius: 13px;
  font-size: 13px;
  font-weight: 700;
}

#playersCount i {
  color: var(--blue);
}

.date-filter-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin-bottom: 20px;
}

/* Page titles */

#playersListTab h2,
#evaluationTab h2,
#evaluatedPlayersTab h2,
#rankingsTab h2,
#progressTab h2,
#playersListHeader {
  margin: 10px 0 24px;
  color: var(--primary) !important;
  text-align: center;
  font-size: 23px;
}

/* Tables */

.table-responsive {
  width: 100%;
  margin: 18px 0;
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 17px;
  -webkit-overflow-scrolling: touch;
}

table,
.players-table {
  width: 100%;
  margin: 0;
  border-collapse: separate;
  border-spacing: 0;
  direction: rtl;
  background: var(--surface);
}

th,
td,
.players-table th,
.players-table td {
  padding: 12px 14px;
  text-align: center;
  border: 0;
  border-left: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-size: 13px;
}

th:last-child,
td:last-child,
.players-table th:last-child,
.players-table td:last-child {
  border-left: 0;
}

tbody tr:last-child td {
  border-bottom: 0;
}

th,
.players-table th {
  background: #f1f7fa;
  color: var(--primary);
  font-weight: 800;
  white-space: nowrap;
}

tbody tr:hover td {
  background: #f8fcfe;
}

.players-table tr:nth-child(even) {
  background: #fbfdfe;
}

/* Player and evaluation cards */

.player-card,
.evaluated-player-card {
  margin-bottom: 18px;
  padding: 21px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-right: 5px solid var(--blue);
  border-left: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: 0 8px 22px rgba(11, 53, 81, 0.06);
}

.evaluated-player-card {
  border-right-color: var(--success);
}

.player-card h3,
.evaluated-player-card h3 {
  margin: 0 0 12px;
  color: var(--primary);
  font-size: 18px;
}

.player-card h3 small,
.evaluated-player-card h3 small {
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
}

.player-card p,
.evaluated-player-card p {
  color: var(--muted);
  font-size: 13px;
}

.evaluation-form {
  margin-top: 18px;
  padding: 19px;
  background: var(--surface-soft);
  border: 1px solid var(--border);
  border-radius: 16px;
}

.evaluation-form h4 {
  margin: 0 0 15px;
  color: var(--primary);
}

/* Evaluation criteria */

.evaluation-criteria {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin-top: 15px;
}

.criteria-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 13px;
  padding: 13px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 13px;
}

.criteria-item label {
  color: var(--primary);
  font-size: 13px;
  font-weight: 700;
}

.criteria-item select {
  width: 130px;
  min-height: 39px;
  padding: 7px 10px;
  color: var(--text);
  background: var(--surface-soft);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: 'NotoKufiArabic', Arial, sans-serif;
}

/* Evaluated sessions */

.player-evaluations {
  display: grid;
  gap: 12px;
}

.evaluation-session {
  padding: 14px 16px;
  background: var(--success-soft);
  border: 1px solid #c8ebd6;
  border-radius: 14px;
}

.evaluation-session p {
  margin: 6px 0;
  color: var(--text);
}

/* Rankings */

.top-three-grid,
.ranking-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 18px;
  margin-bottom: 28px;
}

.ranking-card {
  position: relative;
  width: 215px;
  padding: 21px 17px;
  text-align: center;
  color: var(--text);
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 19px;
  box-shadow: 0 10px 25px rgba(11, 53, 81, 0.08);
  transition: 0.2s ease;
}

.ranking-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 32px rgba(11, 53, 81, 0.12);
}

.ranking-card h3 {
  margin: 10px 0 7px;
  color: var(--primary);
  font-size: 17px;
}

.ranking-card p {
  color: var(--muted);
  font-size: 13px;
}

.player-badge {
  margin-bottom: 8px;
  font-size: 30px;
}

.player-avatar {
  width: 82px;
  height: 82px;
  margin-bottom: 8px;
  object-fit: cover;
  border: 3px solid #d9e4ea;
  border-radius: 50%;
  background: #edf6fa;
}

.glow {
  border-color: #d9c523;
  box-shadow:
    0 0 0 5px rgba(244, 231, 51, 0.13),
    0 15px 35px rgba(244, 231, 51, 0.25);
}

.activity-label {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 8px;
  padding: 6px 11px;
  color: var(--primary);
  background: #eaf5fb;
  border: 1px solid #cce1ee;
  border-radius: 20px;
  box-shadow: none;
  font-size: 12px;
  font-weight: 700;
}

#activityFilter {
  width: auto;
  min-width: 190px;
  padding-left: 38px;
  appearance: none;
  background-color: var(--surface);
  background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg fill='%230b3551' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7 10l5 5 5-5H7z'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: left 11px center;
  background-size: 16px;
}

/* Progress */

.progress-container {
  margin-top: 20px;
}

.progress-bar {
  height: 18px;
  margin-bottom: 10px;
  overflow: hidden;
  background: #e7eef2;
  border-radius: 20px;
}

.progress-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--accent));
  transition: width 0.5s;
}

#progressChartContainer {
  position: relative;
  width: 100%;
  height: 360px;
  margin-top: 20px;
  padding: 15px;
  direction: ltr;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
}

#progressChart {
  width: 100% !important;
  height: 100% !important;
}

/* Footer */

.footer-container {
  width: 100%;
  margin-top: 28px;
  padding: 18px 0;
  color: var(--text);
  text-align: center;
  background: var(--surface);
  border-top: 4px solid var(--accent);
}

.footer-content {
  max-width: 1200px;
  margin: auto;
  padding: 0 20px;
}

.footer-container p {
  margin: 5px 0;
}

.social-icons a {
  margin: 0 9px;
  color: var(--blue);
  font-size: 18px;
  transition: 0.2s ease;
}

.social-icons a:hover {
  color: var(--primary);
}

/* Loading popup */

#loadingPopup {
  color: var(--primary) !important;
  background: var(--surface) !important;
  border: 1px solid var(--border) !important;
  box-shadow: 0 18px 45px rgba(11, 53, 81, 0.18) !important;
}

#loadingPopup .spinner {
  border-color: #e5edf1 !important;
  border-top-color: var(--blue) !important;
}

/* Animations */

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(-8px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes spin {
  from {
    transform: rotate(0deg);
  }

  to {
    transform: rotate(360deg);
  }
}

/* Tablet and phone */

@media (max-width: 768px) {
  .header-right {
    padding: 11px 8px;
    gap: 7px;
  }

  .header-right img.logo {
    height: 43px;
  }

  .divider {
    width: 2px;
    height: 38px;
  }

  .arabic-name {
    font-size: 14px;
  }

  .english-name {
    font-size: 9px;
  }

  .login-container {
    margin: 24px auto;
    padding: 27px 20px;
  }

  .login-container h2 {
    font-size: 21px;
  }

  .container {
    width: calc(100% - 16px);
    margin: 12px auto;
    padding: 14px 10px;
    border-radius: 19px;
  }

  .welcome-banner {
    padding: 15px 12px;
    font-size: 14px;
  }

  .nav-tabs {
    flex-wrap: nowrap;
    justify-content: flex-start;
    overflow-x: auto;
    padding: 8px;
    scrollbar-width: none;
  }

  .nav-tabs::-webkit-scrollbar {
    display: none;
  }

  .nav-tabs button {
    flex: 0 0 auto;
    min-height: 40px;
    padding: 9px 13px;
    font-size: 10px;
    white-space: nowrap;
  }

  #playersCount {
    position: static;
    width: 100%;
    justify-content: center;
    margin-bottom: 12px;
  }

  .form-group {
    width: 100%;
  }

  .date-filter-container {
    flex-direction: column;
    gap: 8px;
  }

  .evaluation-criteria {
    grid-template-columns: 1fr;
  }

  .criteria-item {
    flex-direction: column;
    align-items: stretch;
  }

  .criteria-item select {
    width: 100%;
  }

  .player-card,
  .evaluated-player-card {
    padding: 15px 13px;
  }

  .table-responsive {
    overflow-x: auto;
  }

  .players-table {
    min-width: 540px;
  }

  .players-table th,
  .players-table td {
    padding: 9px 8px;
    font-size: 10px;
    white-space: nowrap;
  }

  .ranking-card {
    width: 155px;
    padding: 14px 9px;
  }

  .player-avatar {
    width: 68px;
    height: 68px;
  }

  .top-three-grid,
  .ranking-grid {
    gap: 10px;
  }

  #rankingsTab > div[style*="display: flex"] {
    flex-direction: column;
  }

  #activityFilter {
    width: 100%;
  }

  #progressChartContainer {
    height: 320px;
    padding: 8px;
  }

  .footer-container {
    padding: 13px 8px;
  }

  .footer-container p {
    font-size: 11px;
  }

  .social-icons a {
    margin: 0 5px;
    font-size: 15px;
  }
}

@media (max-width: 480px) {
  .header-right img.logo {
    height: 37px;
  }

  .divider {
    display: none;
  }

  .arabic-name {
    font-size: 12px;
  }

  .english-name {
    font-size: 8px;
  }

  .ranking-card {
    width: 100%;
  }

  #progressChartContainer {
    height: 290px;
  }
}

.player-search {
  position: relative;
  width: 100%;
  max-width: 720px;
  margin: 0 auto 24px;
}

.player-search input {
  width: 100%;
  min-height: 52px;
  padding: 13px 48px 13px 48px;
  border: 1px solid var(--border);
  border-radius: 15px;
  outline: none;
  background: var(--surface-soft);
  color: var(--text);
  font-family: 'NotoKufiArabic', Arial, sans-serif;
  font-size: 14px;
  transition: 0.2s ease;
}

.player-search input:focus {
  border-color: var(--blue);
  background: var(--surface);
  box-shadow: 0 0 0 4px rgba(47, 128, 237, 0.11);
}

.player-search > i {
  position: absolute;
  top: 50%;
  right: 17px;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}

.clear-search {
  position: absolute;
  top: 50%;
  left: 10px;
  width: 34px;
  height: 34px;
  margin: 0;
  padding: 0;
  transform: translateY(-50%);
  border: 0;
  border-radius: 50%;
  background: transparent;
  color: var(--muted);
  font-size: 23px;
  cursor: pointer;
  box-shadow: none;
}

.clear-search:hover {
  transform: translateY(-50%);
  background: #e9f1f5;
  box-shadow: none;
}
  </style>
</head>
<body>

  <header class="header-container">
    <div class="header-right">
      <img src="Picture3.png" alt="شعار الشارقة" class="logo">
      <div class="divider"></div>
      <img src="logo.png" alt="شعار نادي كلباء" class="logo">
      <div class="header-info">
        <div class="arabic-name">نادي كلباء الرياضي الثقافي</div>
        <div class="english-name">KALBA SPORTS & CULTURAL CLUB</div>
      </div>
    </div>
  </header>

  <div id="loginView" class="login-container">
    <h2>تسجيل دخول المدربين</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">اسم المستخدم</label>
        <input type="text" id="username" required>
      </div>

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    if (dateStr.includes('/')) {
      const [day, month, year] = dateStr.split(' ')[0].split('/');
      return `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
    }

    const d = dateStr.includes('T') ? new Date(dateStr) : new Date(dateStr + 'T00:00:00');
    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  } catch {
    return dateStr;
  }
}

function normalizeArabicSearch(value) {
  return String(value || "")
    .toLowerCase()
    .replace(/[\u064B-\u065F\u0670]/g, "")
    .replace(/ـ/g, "")
    .replace(/[أإآٱ]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ؤ/g, "و")
    .replace(/ئ/g, "ي")
    .replace(/ة/g, "ه")
    .replace(/\s+/g, " ")
    .trim();
}

function searchPlayers() {
  const input = document.getElementById("playerSearch");

  if (!input) return;

    currentDisplayedPlayers.length > 0
      ? currentDisplayedPlayers
      : playersData;

  if (!query) {
    renderPlayersList(sourcePlayers);
    return;
  }

  const searchWords = query.split(" ").filter(Boolean);

  const filteredPlayers = sourcePlayers.filter(player => {
    const searchableText = normalizeArabicSearch([
      player.name,
      player.parent,
      player.id
    ].filter(Boolean).join(" "));

    return searchWords.every(word =>
      searchableText.includes(word)
    );
  });

  renderPlayersList(filteredPlayers);
}

async function saveEvaluation(playerId, playerDate) {
  const player = playersData.find(p => p.id === playerId);
  if (!player) {
    showToast('لاعب غير موجود', false);
    return;
  }

  const evaluationDate = playerDate;
  const playerDateFormatted = formatDate(evaluationDate);

const alreadyEvaluated = evaluations.some(row => {
  const evalDateFormatted = formatDate(row["Date"]);
  console.log({ evalDate: row["Date"], playerIdEval: row["Player ID"] });
  return row["Player ID"] === playerId && evalDateFormatted === playerDateFormatted;
});

  if (alreadyEvaluated) {
    showToast('تم تقييم هذا اللاعب بالفعل في هذا التاريخ', false);
    return;
  }

  const evaluationData = {
    Timestamp: new Date().toISOString(),
    Coach: currentCoach.username,
    Activity: currentCoach.activity,
    "Player Name": player.name,
    "Player ID": player.id,
    "Parent": player.parent || "",
    "Date": evaluationDate, 
    "Notes": document.getElementById(`notes-${player.id}`)?.value || "",
  };

  evaluationCriteria[currentCoach.activity].forEach((criteria, index) => {
    const score = document.getElementById(`${player.id}-skill${index + 1}`)?.value;
    evaluationData[criteria] = score ? parseInt(score) : 0;
  });

  try {
    showLoading();
    
    await sendEvaluation(evaluationData);
    
    evaluations.push(evaluationData);
    
    const playerCard = document.querySelector(`.player-card:has(#criteria-${playerId})`);
    if (playerCard) {
      playerCard.remove();
    }
    
    showToast('✅ تم حفظ التقييم بنجاح', true);
    
    renderEvaluatedPlayersList();
    
    const remainingPlayers = document.querySelectorAll('.player-card').length;
    document.getElementById('playersCount').textContent = `عدد اللاعبين: ${remainingPlayers}`;
    
  } catch (err) {
    console.error("Evaluation error:", err);
    showToast('❌ فشل في إرسال التقييم: ' + (err.message || err), false);
  } finally {
    hideLoading();  
  }
}
    
async function sendEvaluation(evaluationData) {
  try {
    const url = CONFIG.USE_CORS_PROXY 
      ? CONFIG.CORS_PROXY_URL + CONFIG.EVALUATION_SCRIPT_URL 
      : CONFIG.EVALUATION_SCRIPT_URL;

    const formData = new URLSearchParams();
    
    for (const key in evaluationData) {
      let value = evaluationData[key];
      
      if (key in evaluationCriteria[currentCoach.activity]) {
        const arabicKey = evaluationCriteria[currentCoach.activity].find(c => c === key);
        formData.append(arabicKey, value);
      } else {
        formData.append(key, value);
      }
    }

    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8',
      },
      body: formData
    });

const responseText = await response.text();

if (!response.ok) {
  throw new Error(
    `Apps Script error ${response.status}: ${responseText}`
  );
}

let result;

try {
  result = JSON.parse(responseText);
} catch {
  result = { status: "unknown", raw: responseText };
}

if (
  result.status === "error" ||
  result.success === false
) {
  throw new Error(
    result.message || "Apps Script rejected the evaluation"
  );
}

if (result.status === "duplicate") {
  throw new Error(
    result.message || "تم تقييم اللاعب مسبقاً في هذا التاريخ"
  );
}

return result;
    
  } catch (error) {
    console.error("Send evaluation error:", error);
    throw error;
  }
}

  document.getElementById("filterDate").value;

const processedData = data
  .filter(rec => {
    const matchesActivity =
      rec.Activity === currentCoach.activity;

    const matchesDate =
      !selectedDate ||
      formatDate(rec.Date) === selectedDate;

    return matchesActivity && matchesDate;
  })
  .map(rec => {
  let total = 0;
  const criteria = evaluationCriteria[currentCoach.activity] || [];
  criteria.forEach(criterion => { total += parseInt(rec[criterion]) || 0; });
  const percentage = Math.round((total / (criteria.length * 5)) * 100) + "%";
  return {
    ...rec,
    "Date": formatDate(rec.Date),
    "Time-stamp": formatDate(rec["Timestamp"]),
    "Total Score": total,
    "Percentage": percentage,
    normalizedPlayerId: String(rec["Player ID"]).trim(),
    normalizedDate: formatDate(rec.Date)
  };
});

    evaluations = processedData;

    const playersMap = new Map();
processedData.forEach(rec => { 
  const playerId = rec.normalizedPlayerId;

  if (!playersMap.has(playerId)) {
    playersMap.set(playerId, {
      id: playerId,
      name: rec["Player Name"],
      evaluations: []
    });
  }

  playersMap.get(playerId).evaluations.push(rec);
});

    container.innerHTML = '';

    if (playersMap.size === 0) {
      container.innerHTML = '<p>لا يوجد لاعبون مقييمون بعد</p>';
      return;
    }

    const sortedPlayers = Array.from(playersMap.values()).sort((a, b) => {
      const dateA = new Date(b.evaluations[0]["Time-stamp"]);
      const dateB = new Date(a.evaluations[0]["Time-stamp"]);
      return dateA - dateB;
    });

      playerCard.innerHTML = `
        <h3>${player.name || 'غير معروف'} <small>(${player.id || 'غير معروف'})</small></h3>
        <div class="player-evaluations">
          ${player.evaluations.map(rec => `
            <div class="evaluation-session">
              <p><strong>تاريخ الحضور:</strong> ${rec["Date"] || 'غير محدد'}</p>
              <p><strong>تاريخ التقييم:</strong> ${rec["Time-stamp"] || 'غير محدد'}</p>
              <p><strong>المجموع:</strong> ${rec["Total Score"] || 0}/25 (${rec["Percentage"] || '0%'})</p>
              ${rec["Notes"] ? `<p><strong>ملاحظات:</strong> ${rec["Notes"]}</p>` : ''}

}
    
async function updateRankings() {
  showLoading();

  try {
    const url = CONFIG.USE_CORS_PROXY 
      ? CONFIG.CORS_PROXY_URL + CONFIG.EVALUATION_SCRIPT_URL
      : CONFIG.EVALUATION_SCRIPT_URL;

    const response = await fetch(url);
    const data = await response.json();

    const selectedActivity = document.getElementById('activityFilter')?.value || 'all';

    const filtered = data.filter(e => {
      const activity = e.Activity?.trim();

      if (!activity) return false;
      if (!e["Player ID"] || !e["Player Name"]) return false;

      const criteria = evaluationCriteria[activity] || [];

      const hasEvaluationScores = criteria.some(criterion => {
        return e[criterion] !== undefined && e[criterion] !== "" && !isNaN(parseInt(e[criterion]));
      });

      if (!hasEvaluationScores) return false;

      return selectedActivity === 'all' || activity === selectedActivity;
    });

    const playerStats = {};

    filtered.forEach(e => {
      const activity = e.Activity.trim();
      const playerId = String(e["Player ID"]).trim();
      const criteria = evaluationCriteria[activity] || [];

      let total = 0;
      criteria.forEach(criterion => {
        total += parseInt(e[criterion]) || 0;
      });

      const percentage = Math.round((total / (criteria.length * 5)) * 100);

      if (!playerStats[playerId]) {
        playerStats[playerId] = {
          name: e["Player Name"],
          activity: activity,
          total: 0,
          count: 0
        };
      }

      playerStats[playerId].total += percentage;
      playerStats[playerId].count++;
    });

    const rankings = Object.entries(playerStats).map(([id, player]) => ({
      id,
      name: player.name,
      activity: player.activity,
      average: Math.round(player.total / player.count)
    }));

    rankings.sort((a, b) => b.average - a.average);

    const topThreeContainer = document.getElementById('topThreeContainer');
    const container = document.getElementById('rankingsContainer');

    topThreeContainer.innerHTML = '';
    container.innerHTML = '';

    const top3 = rankings.slice(0, 3);
    const others = rankings.slice(3, 50);

    const orderedTop3 = [top3[1], top3[0], top3[2]];

    orderedTop3.forEach((player, index) => {
      if (!player) return;

      const card = document.createElement('div');
      card.className = 'ranking-card';

      const badges = ['🥈', '👑', '🥉'];

      card.innerHTML = `
        <div class="player-badge">${badges[index]}</div>
        <img src="user-icon.png" class="player-avatar" />
        <h3>${player.name}</h3>
        <p class="activity-label">${getActivityIcon(player.activity)} ${player.activity}</p>
        <p>ID: ${player.id}</p>
        <p>المعدل: ${player.average}%</p>
      `;

      if (index === 1) card.classList.add("glow");

      topThreeContainer.appendChild(card);
    });

    others.forEach((player, index) => {
      const card = document.createElement('div');
      card.className = 'ranking-card';

      card.innerHTML = `
        <div class="player-badge">${index + 4}</div>
        <img src="user-icon.png" class="player-avatar" />
        <h3>${player.name}</h3>
        <p class="activity-label">${getActivityIcon(player.activity)} ${player.activity}</p>
        <p>ID: ${player.id}</p>
        <p>المعدل: ${player.average}%</p>
      `;

      container.appendChild(card);
    });

  } catch (err) {
    console.error("Error:", err);
    showToast('❌ فشل في تحميل التصنيفات:\n' + err.message, false);
  } finally {
    hideLoading();
  }
}

let progressChart = null;

async function showPlayerProgress() {
  try {
    const container = document.getElementById('progressChartContainer');
    const playerSelect = document.getElementById('playerSelect');

    if (!container || !playerSelect) {
      throw new Error('Missing required DOM elements');
    }

    if (progressChart) {
      progressChart.destroy();
      progressChart = null;
    }

    const playerId = playerSelect.value.trim();

    if (!playerId) {
      container.innerHTML = '<p style="color:white; text-align:center; padding:20px;">الرجاء اختيار لاعب</p>';
      return;
    }

    if (evaluations.length === 0) {
      evaluations = await fetchEvaluationsFromSheet();
    }

    const playerEvals = evaluations
      .filter(e =>
        String(e["Player ID"]).trim() === playerId &&
        e.Activity === currentCoach.activity
      )
      .sort((a, b) => new Date(a.Date) - new Date(b.Date));

    if (playerEvals.length === 0) {
      container.innerHTML = '<p style="color:white; text-align:center; padding:20px;">لا توجد بيانات لهذا اللاعب</p>';
      return;
    }

    const dates = playerEvals.map(e => formatDate(e.Date));

    const percentages = playerEvals.map(e => {
      const criteria = evaluationCriteria[currentCoach.activity] || [];
      const total = criteria.reduce((sum, crit) => sum + (parseInt(e[crit]) || 0), 0);
      return Math.round((total / (criteria.length * 5)) * 100);
    });

    container.innerHTML = '<canvas id="progressChart"></canvas>';
    const ctx = document.getElementById('progressChart').getContext('2d');

    progressChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: dates,
        datasets: [{
          label: 'تطور الأداء (%)',
          data: percentages,
borderColor: '#2f80ed',
backgroundColor: 'rgba(47, 128, 237, 0.12)',
          borderWidth: 3,
          pointRadius: 5,
          pointHoverRadius: 7,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            rtl: true,
            labels: {
              color: '#1f2937',
              font: {
                family: 'NotoKufiArabic',
                size: 14
              }
            }
          },
          tooltip: {
            rtl: true,
            bodyFont: {
              family: 'NotoKufiArabic'
            },
            callbacks: {
              label: (context) => `${context.parsed.y}%`
            }
          }
        },
        scales: {
          x: {
            ticks: { color: '#1f2937' },
            grid: { color: 'rgba(11,53,81,0.08)' }
          },
          y: {
            min: 0,
            max: 100,
            ticks: {
              color: '#1f2937',
              callback: (val) => `${val}%`
            },
            grid: { color: 'rgba(11,53,81,0.08)' }
          }
        }
      },
      plugins: [{
        id: 'showPercentLabels',
        afterDatasetsDraw(chart) {
          const { ctx } = chart;

          ctx.save();
          ctx.fillStyle = '#0b3551';
          ctx.font = 'bold 14px NotoKufiArabic';
          ctx.textAlign = 'center';

          chart.data.datasets[0].data.forEach((value, index) => {
            const point = chart.getDatasetMeta(0).data[index];
            ctx.fillText(value + '%', point.x, point.y - 15);
          });

          ctx.restore();
        }
      }]
    });

  } catch (error) {
    console.error('Error in showPlayerProgress:', error);
    showToast('❌ حدث خطأ في عرض التطور', false);
  }
}

function debounce(func, wait = 100) {
  let timeout;
  return function(...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
      func.apply(this, args);
    }, wait);
  };
}

document.addEventListener('DOMContentLoaded', function() {
  const lazyImages = [].slice.call(document.querySelectorAll('img.lazy'));

  if ('IntersectionObserver' in window) {
    let lazyImageObserver = new IntersectionObserver(function(entries, observer) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          let lazyImage = entry.target;
          lazyImage.src = lazyImage.dataset.src;
          lazyImage.classList.remove('lazy');
          lazyImageObserver.unobserve(lazyImage);
        }
      });
    });

    lazyImages.forEach(function(lazyImage) {
      lazyImageObserver.observe(lazyImage);
    });
  }
});
