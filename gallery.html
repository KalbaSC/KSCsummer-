<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معرض الصور - نادي كلباء</title>

<style>
@font-face {
  font-family: 'NotoKufiArabic';
  src: url('NotoKufiArabic.ttf') format('truetype');
  font-display: swap;
}

:root {
  --navy: #0b3551;
  --blue: #2f80ed;
  --yellow: #f4e733;
  --yellow-dark: #e4d824;
  --background: #eef6f8;
  --surface: #ffffff;
  --surface-soft: #f7fbfd;
  --text: #1f2937;
  --muted: #6b7280;
  --border: #dfe7ec;
  --shadow: 0 16px 40px rgba(11, 53, 81, 0.09);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  font-family: 'NotoKufiArabic', Arial, sans-serif;
}

body {
  min-height: 100vh;
  padding: 35px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  background:
    radial-gradient(
      circle at top right,
      rgba(244, 231, 51, 0.16),
      transparent 28%
    ),
    linear-gradient(
      135deg,
      #eef6f8 0%,
      #f8fbfc 55%,
      #edf6fa 100%
    );
}

.gallery-card {
  width: 100%;
  max-width: 940px;
  padding: 55px 45px;
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 30px;
  box-shadow: var(--shadow);
}

.icon {
  width: 86px;
  height: 86px;
  margin: 0 auto 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: #eef6fb;
  font-size: 42px;
  box-shadow: inset 0 0 0 1px #d9e8f1;
}

.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 18px;
  padding: 8px 18px;
  border: 1px solid #d5e5ef;
  border-radius: 999px;
  background: #f5faff;
  color: var(--navy);
  font-size: 14px;
  font-weight: bold;
}

h1 {
  margin: 0 0 15px;
  color: var(--navy);
  font-size: 40px;
}

p {
  max-width: 650px;
  margin: 0 auto 32px;
  color: var(--muted);
  font-size: 17px;
  line-height: 1.9;
}

.info-box {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin: 30px 0;
}

.info-item {
  min-height: 92px;
  padding: 20px 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface-soft);
  border: 1px solid var(--border);
  border-radius: 18px;
  color: var(--navy);
  font-size: 14px;
  font-weight: bold;
  transition: 0.2s ease;
}

.info-item:hover {
  transform: translateY(-2px);
  background: #f0f8fc;
  border-color: #c9dfe9;
}

.gallery-btn {
  min-width: 250px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 17px 45px;
  border-radius: 17px;
  background: linear-gradient(
    135deg,
    var(--yellow),
    #fff176
  );
  color: #222;
  text-decoration: none;
  font-size: 19px;
  font-weight: bold;
  box-shadow: 0 10px 24px rgba(244, 231, 51, 0.25);
  transition: 0.2s ease;
}

.gallery-btn:hover {
  transform: translateY(-3px);
  background: linear-gradient(
    135deg,
    var(--yellow-dark),
    var(--yellow)
  );
  box-shadow: 0 14px 30px rgba(244, 231, 51, 0.34);
}

.note {
  margin-top: 18px;
  color: var(--muted);
  font-size: 12px;
}

@media (max-width: 700px) {
  body {
    padding: 12px;
    align-items: flex-start;
  }

  .gallery-card {
    padding: 35px 18px;
    border-radius: 22px;
  }

  .icon {
    width: 72px;
    height: 72px;
    font-size: 35px;
  }

  h1 {
    font-size: 27px;
  }

  p {
    font-size: 14px;
    line-height: 1.8;
  }

  .info-box {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .info-item {
    min-height: 65px;
    padding: 14px 10px;
  }

  .gallery-btn {
    width: 100%;
    min-width: 0;
    padding: 15px;
    font-size: 16px;
  }
}
</style>
</head>

<body>

<div class="gallery-card">

  <div class="badge">المركز الإعلامي</div>
  <h1>معرض الصور</h1>

  <p>
    استعرض صور فعاليات وأنشطة نادي كلباء الرياضي الثقافي
    وصيف الشارقة الرياضي من خلال معرض الصور الرسمي.
  </p>

  <div class="info-box">
    <div class="info-item">صور الفعاليات</div>
    <div class="info-item">أنشطة النادي</div>
    <div class="info-item">تحديث مستمر</div>
  </div>

 <a class="gallery-btn"
   href="https://os5.mycloud.com/public/04312f54-c1c0-416b-8e98-ebb10fa0ca97/folders/sus7f6bjnjm3jziysimoxwll?single=true"
   target="_blank"
   rel="noopener noreferrer">
  استعراض الصور
</a>
<div class="note">
  سيتم فتح الصور في نافذة جديدة  
</div>

</div>
<script>
  function forceInsideMainPortal() {
  if (window.top === window.self) {
    window.location.replace("KSCsummer.html?page=" + location.pathname.split("/").pop());
  }
}

forceInsideMainPortal();
window.addEventListener("pageshow", forceInsideMainPortal);
  
(() => {
  const isEmbedded = new URLSearchParams(location.search).has('embed');

  if (!isEmbedded) return;

  function sendSize() {
    const b = document.body;
    const e = document.documentElement;

    const h = Math.max(
      b.scrollHeight,
      b.offsetHeight,
      e.scrollHeight,
      e.offsetHeight
    );

    window.parent.postMessage({
      type: 'kalba-iframe-size',
      height: h
    }, '*');
  }

  window.addEventListener('load', sendSize);

  const observer = new MutationObserver(sendSize);
  observer.observe(document.body, {
    childList: true,
    subtree: true,
    attributes: true
  });

  setTimeout(sendSize, 300);
})();
</script>
</body>
</html>
