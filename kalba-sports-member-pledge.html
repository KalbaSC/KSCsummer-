<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عهد المنتسب الرياضي | نادي كلباء الرياضي الثقافي</title>
  <style>
    :root{
      --navy:#0b2f55;
      --blue:#1b78b3;
      --yellow:#f4c430;
      --bg:#eef7fb;
      --white:#fff;
      --text:#16324a;
      --muted:#6b7d8d;
      --line:#d7e4eb;
    }

    *{box-sizing:border-box;font-family:Tahoma,Arial,sans-serif}

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 10% 8%,rgba(244,196,48,.22),transparent 22%),
        radial-gradient(circle at 90% 12%,rgba(27,120,179,.18),transparent 24%),
        linear-gradient(135deg,#e8f5fa,#f9fcfd 55%,#e9f4f8);
      color:var(--text);
    }

    .app{
      max-width:1450px;
      margin:auto;
      padding:22px;
      display:grid;
      grid-template-columns:390px 1fr;
      gap:22px;
      align-items:start;
    }

    .panel,.preview{
      background:rgba(255,255,255,.98);
      border:1px solid rgba(11,47,85,.08);
      border-radius:26px;
      box-shadow:0 24px 70px rgba(11,47,85,.16);
    }

    .panel{
      padding:22px;
      position:sticky;
      top:18px;
      max-height:calc(100vh - 36px);
      overflow:auto;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      padding:16px;
      border-radius:20px;
      background:linear-gradient(135deg,var(--navy),var(--blue));
      color:#fff;
      margin-bottom:18px;
    }

    .brand-logo{
      width:68px;
      height:68px;
      border-radius:20px;
      display:grid;
      place-items:center;
      background:linear-gradient(145deg,var(--yellow),#ffe58b);
      color:var(--navy);
      font-weight:900;
      font-size:28px;
      box-shadow:inset 0 0 0 4px rgba(255,255,255,.35);
    }

    .brand h1{margin:0 0 4px;font-size:22px}
    .brand p{margin:0;font-size:12px;line-height:1.6;opacity:.86}

    .section-title{
      margin:18px 0 10px;
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--navy);
      font-size:15px;
      font-weight:900;
    }

    .section-title::before{
      content:"";
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--yellow);
      box-shadow:0 0 0 5px rgba(244,196,48,.18);
    }

    label{
      display:block;
      margin:12px 0 6px;
      color:var(--navy);
      font-size:13px;
      font-weight:700;
    }

    input,select{
      width:100%;
      padding:12px 13px;
      border:1px solid var(--line);
      border-radius:13px;
      background:#fff;
      color:var(--text);
      font-size:15px;
      outline:none;
    }

    input:focus,select:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 4px rgba(27,120,179,.12);
    }

    .search-box{position:relative}

    .search-results{
      display:none;
      position:absolute;
      top:calc(100% + 6px);
      right:0;
      left:0;
      z-index:20;
      max-height:260px;
      overflow:auto;
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 16px 38px rgba(11,47,85,.16);
    }

    .search-item{
      padding:12px;
      border-bottom:1px solid #edf2f5;
      cursor:pointer;
    }

    .search-item:last-child{border-bottom:0}
    .search-item:hover{background:#f3f9fc}
    .search-name{font-weight:900;color:var(--navy);margin-bottom:4px}
    .search-meta{font-size:12px;color:var(--muted)}

    .member-card{
      display:none;
      margin-top:12px;
      padding:14px;
      border-radius:16px;
      background:linear-gradient(135deg,#f7fbfd,#eef7fb);
      border:1px solid #d8e8f0;
    }

    .member-card strong{color:var(--navy)}
    .member-row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;font-size:13px}

    .value-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:9px;
    }

    .value-item{
      display:flex;
      align-items:center;
      gap:8px;
      padding:11px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fbfdff;
      cursor:pointer;
      font-size:13px;
      font-weight:700;
      transition:.2s;
    }

    .value-item:hover{
      transform:translateY(-1px);
      border-color:var(--yellow);
    }

    .value-item input{width:auto;accent-color:var(--navy)}

    .pledge-list{
      display:grid;
      gap:8px;
      padding:12px;
      border:1px dashed #b9d5e5;
      border-radius:16px;
      background:#f6fbfd;
    }

    .pledge-list label{
      display:flex;
      align-items:flex-start;
      gap:8px;
      margin:0;
      color:var(--text);
      font-weight:600;
      line-height:1.6;
    }

    .pledge-list input{width:auto;margin-top:4px;accent-color:#14855f}

    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:18px;
    }

    button{
      border:0;
      border-radius:14px;
      padding:13px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
    }

    .primary{background:linear-gradient(135deg,var(--yellow),#dcae16);color:var(--navy)}
    .secondary{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff}
    .light{grid-column:1/-1;background:#edf5f9;color:var(--navy)}

    .error{
      display:none;
      margin-top:12px;
      padding:11px;
      border-radius:12px;
      background:#fff1f0;
      color:#b42318;
      font-size:13px;
      font-weight:700;
    }

    .preview{padding:16px;overflow:auto}

    .preview-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
      padding:4px 4px 0;
    }

    .preview-head h2{margin:0;color:var(--navy);font-size:20px}
    .preview-head span{color:var(--muted);font-size:12px}

    canvas{
      display:block;
      width:100%;
      height:auto;
      border:1px solid #d7e4eb;
      border-radius:18px;
      background:#fff;
    }

    @media(max-width:950px){
      .app{grid-template-columns:1fr;padding:12px}
      .panel{position:static;max-height:none}
      .grid2{grid-template-columns:1fr}
    }

    @media(max-width:560px){
      .value-grid,.actions{grid-template-columns:1fr}
      .light{grid-column:auto}
    }
  </style>
</head>
<body>
  <main class="app">

    <section class="panel">
      <div class="brand">
        <div class="brand-logo">K</div>
        <div>
          <h1>عهد المنتسب الرياضي</h1>
          <p>نادي كلباء الرياضي الثقافي<br>تصميم رياضي رسمي وتفاعلي</p>
        </div>
      </div>

      <div class="section-title">البحث عن المنتسب</div>

      <label for="memberSearch">ابحث عن اسم المنتسب</label>
      <div class="search-box">
        <input
          id="memberSearch"
          type="text"
          placeholder="اكتب جزءاً من الاسم"
          autocomplete="off"
          oninput="searchMembers()"
        >
        <div id="searchResults" class="search-results"></div>
      </div>

      <div id="memberCard" class="member-card">
        <div class="member-row"><strong>اسم المنتسب</strong><span id="cardName">—</span></div>
        <div class="member-row"><strong>ولي الأمر</strong><span id="cardParent">—</span></div>
        <div class="member-row"><strong>رقم التسجيل</strong><span id="cardId">—</span></div>
      </div>

      <input id="participantName" type="hidden">
      <input id="memberId" type="hidden">
      <input id="parentName" type="hidden">

      <div class="section-title">القيم الرياضية</div>

      <div class="value-grid">
        <label class="value-item"><input type="checkbox" value="الالتزام" checked> الالتزام</label>
        <label class="value-item"><input type="checkbox" value="الاحترام" checked> الاحترام</label>
        <label class="value-item"><input type="checkbox" value="العمل الجماعي"> العمل الجماعي</label>
        <label class="value-item"><input type="checkbox" value="الروح الرياضية"> الروح الرياضية</label>
        <label class="value-item"><input type="checkbox" value="التميز"> التميز</label>
        <label class="value-item"><input type="checkbox" value="المسؤولية"> المسؤولية</label>
      </div>

      <div class="section-title">بنود العهد</div>

      <div class="pledge-list">
        <label><input type="checkbox" checked> ألتزم بالحضور والانضباط واحترام المواعيد.</label>
        <label><input type="checkbox" checked> أحترم المدربين والإداريين وزملائي.</label>
        <label><input type="checkbox" checked> أحافظ على مرافق النادي وممتلكاته.</label>
        <label><input type="checkbox" checked> أتحلى بالروح الرياضية داخل النادي وخارجه.</label>
        <label><input type="checkbox" checked> أمثل نادي كلباء بصورة مشرفة.</label>
      </div>

      <div class="section-title">التوقيعات</div>

      <div class="grid2">
        <div>
          <label for="participantSignature">توقيع المنتسب</label>
          <input id="participantSignature" placeholder="اكتب الاسم كتوقيع">
        </div>

        <div>
          <label for="parentSignature">توقيع ولي الأمر</label>
          <input id="parentSignature" placeholder="اكتب الاسم كتوقيع">
        </div>
      </div>

      <label for="pledgeDate">التاريخ</label>
      <input id="pledgeDate" type="date">

      <div id="errorBox" class="error">
        يرجى اختيار المنتسب وكتابة التوقيعين.
      </div>

      <div class="actions">
        <button class="primary" onclick="generatePledge()">اعتماد عهد المنتسب</button>
        <button class="secondary" onclick="downloadPledge()">تحميل كصورة</button>
        <button class="light" onclick="printPledge()">طباعة العهد</button>
      </div>
    </section>

    <section class="preview">
      <div class="preview-head">
        <h2>معاينة عهد المنتسب</h2>
        <span>تصميم رياضي مختلف عن ميثاق الأسرة</span>
      </div>

      <canvas id="pledgeCanvas" width="1000" height="1414"></canvas>
    </section>

  </main>

<script>

const REGISTRATION_API =
  "https://script.google.com/macros/s/AKfycbysWX_UMRpmi_wv316IUcihXjjDVE-bTNsXagOWCDF2EjM33VaFP5Ru9YZkhcdcyFhIZQ/exec";

let members = [];

async function loadMembers() {
  try {
    const response = await fetch(
      `${REGISTRATION_API}?action=listRegisteredKids`
    );

    if (!response.ok) {
      throw new Error("Unable to connect to registration system");
    }

    const result = await response.json();

    if (!result.success || !Array.isArray(result.data)) {
      throw new Error(result.message || "Invalid registration data");
    }

    members = result.data
      .filter(child => child.childName)
      .map(child => ({
        id: child.registrationId || "",
        name: child.childName || "",
        parent: child.parentName || "",
        age: child.age || "",
        emiratesId: child.emiratesId || ""
      }));

alert(`Loaded ${members.length} registered children`);
    
  } catch (error) {
    console.error(error);

    document.getElementById("searchResults").innerHTML = `
      <div class="search-item">
        <div class="search-name">تعذر تحميل بيانات المنتسبين</div>
        <div class="search-meta">تحقق من رابط Google Apps Script وإعدادات النشر</div>
      </div>
    `;
  }
}

  const canvas = document.getElementById('pledgeCanvas');
  const ctx = canvas.getContext('2d');
  let generated = false;

function searchMembers() {
  const input = document.getElementById("memberSearch");
  const results = document.getElementById("searchResults");
  const query = normalizeArabic(input.value);

  if (!query) {
    results.style.display = "none";
    results.innerHTML = "";
    return;
  }

  if (!members.length) {
    results.innerHTML = `
      <div class="search-item">
        <div class="search-name">جاري تحميل الأسماء...</div>
      </div>
    `;
    results.style.display = "block";
    return;
  }

  const matches = members
    .filter(member =>
      normalizeArabic(member.name).includes(query)
    )
    .slice(0, 20);

  if (!matches.length) {
    results.innerHTML = `
      <div class="search-item">
        <div class="search-name">لا توجد نتائج مطابقة</div>
      </div>
    `;
    results.style.display = "block";
    return;
  }

  results.innerHTML = matches.map((member, index) => `
    <div class="search-item" onclick="selectMemberByIndex(${members.indexOf(member)})">
      <div class="search-name">${escapeHtml(member.name)}</div>
      <div class="search-meta">
        ولي الأمر: ${escapeHtml(member.parent || "غير مسجل")}
        • رقم التسجيل: ${escapeHtml(member.id || "—")}
      </div>
    </div>
  `).join("");

  results.style.display = "block";
}

function normalizeArabic(value) {
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/[أإآ]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ؤ/g, "و")
    .replace(/ئ/g, "ي")
    .replace(/ة/g, "ه")
    .replace(/[\u064B-\u065F]/g, "");
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}  
function selectMemberByIndex(index) {
  const member = members[index];

  if (!member) return;

  document.getElementById("memberSearch").value = member.name;
  document.getElementById("participantName").value = member.name;
  document.getElementById("memberId").value = member.id;
  document.getElementById("parentName").value = member.parent;

  document.getElementById("cardName").textContent =
    member.name || "—";

  document.getElementById("cardParent").textContent =
    member.parent || "—";

  document.getElementById("cardId").textContent =
    member.id || "—";

  document.getElementById("memberCard").style.display = "block";
  document.getElementById("searchResults").style.display = "none";

  document.getElementById("participantSignature").value =
    member.name || "";

  document.getElementById("parentSignature").value =
    member.parent || "";
}

  function roundedRect(x,y,w,h,r,fill,stroke=null,lineWidth=1){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);

    if(fill){
      ctx.fillStyle=fill;
      ctx.fill();
    }

    if(stroke){
      ctx.strokeStyle=stroke;
      ctx.lineWidth=lineWidth;
      ctx.stroke();
    }
  }

  function fitText(text,maxWidth,startSize,minSize=14,weight='bold'){
    let size=startSize;

    do{
      ctx.font=`${weight} ${size}px Tahoma, Arial`;
      if(ctx.measureText(text).width<=maxWidth) return size;
      size--;
    }while(size>=minSize);

    return minSize;
  }

  function drawText(text,x,y,maxWidth,size=24,align='right',color='#17324a',weight='bold'){
    ctx.save();
    ctx.direction=/[ء-ي]/.test(text)?'rtl':'ltr';
    ctx.textAlign=align;
    ctx.textBaseline='middle';
    ctx.fillStyle=color;

    const finalSize=fitText(text,maxWidth,size,13,weight);
    ctx.font=`${weight} ${finalSize}px Tahoma, Arial`;
    ctx.fillText(text,x,y,maxWidth);
    ctx.restore();
  }

  function formatDate(value){
    if(!value) return '';
    const [year,month,day]=value.split('-');
    return `${day}/${month}/${year}`;
  }

  function getSelectedValues(){
    return [...document.querySelectorAll('.value-item input:checked')]
      .map(input=>input.value)
      .slice(0,6);
  }

  function drawLogo(){
    ctx.save();
    ctx.translate(500,118);

    ctx.beginPath();
    ctx.moveTo(0,-66);
    ctx.lineTo(62,-35);
    ctx.lineTo(50,44);
    ctx.lineTo(0,82);
    ctx.lineTo(-50,44);
    ctx.lineTo(-62,-35);
    ctx.closePath();

    ctx.fillStyle='#f4c430';
    ctx.fill();

    ctx.lineWidth=8;
    ctx.strokeStyle='#fff';
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0,-3,28,0,Math.PI*2);
    ctx.fillStyle='#0b2f55';
    ctx.fill();

    ctx.fillStyle='#fff';
    ctx.font='bold 28px Arial';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('K',0,-1);

    ctx.restore();
  }

  function drawBase(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const bg=ctx.createLinearGradient(0,0,1000,1414);
    bg.addColorStop(0,'#fbfdff');
    bg.addColorStop(1,'#e8f5fa');

    ctx.fillStyle=bg;
    ctx.fillRect(0,0,1000,1414);

    ctx.fillStyle='#0b2f55';
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(1000,0);
    ctx.lineTo(1000,250);
    ctx.lineTo(760,320);
    ctx.lineTo(0,220);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle='#1b78b3';
    ctx.beginPath();
    ctx.moveTo(0,180);
    ctx.lineTo(1000,290);
    ctx.lineTo(1000,335);
    ctx.lineTo(0,235);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle='#f4c430';
    ctx.beginPath();
    ctx.moveTo(0,230);
    ctx.lineTo(1000,330);
    ctx.lineTo(1000,352);
    ctx.lineTo(0,255);
    ctx.closePath();
    ctx.fill();

    ctx.save();
    ctx.globalAlpha=.045;
    ctx.strokeStyle='#0b2f55';
    ctx.lineWidth=4;
    ctx.strokeRect(90,360,820,900);

    ctx.beginPath();
    ctx.moveTo(500,360);
    ctx.lineTo(500,1260);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(500,810,105,0,Math.PI*2);
    ctx.stroke();

    ctx.restore();

    drawLogo();

    drawText('نادي كلباء الرياضي الثقافي',500,220,780,32,'center','#fff');
    drawText('عهد المنتسب الرياضي',500,292,800,48,'center','#0b2f55');

    drawText(
      'أنا بطل في نادي كلباء، وأتعهد أن أمثل النادي بأفضل صورة داخل الملعب وخارجه',
      500,345,850,22,'center','#31546d','normal'
    );

    roundedRect(70,390,860,230,24,'#fff','#d7e5ed',2);
    drawText('بيانات المنتسب',865,430,300,26,'right','#0b2f55');

    roundedRect(70,650,860,285,24,'#fff','#d7e5ed',2);
    drawText('قيم نادي كلباء',865,690,300,26,'right','#0b2f55');

    roundedRect(70,960,860,220,24,'#fff','#d7e5ed',2);
    drawText('العهد الرياضي',865,1000,300,26,'right','#0b2f55');

    ctx.fillStyle='#0b2f55';
    ctx.fillRect(0,1320,1000,94);

    drawText(
      'نلتزم بالقيم • نصنع الأبطال • نمثل كلباء بفخر',
      500,1365,900,21,'center','#fff'
    );
  }

  function generatePledge(){
    const name=document.getElementById('participantName').value.trim();
    const memberId=document.getElementById('memberId').value.trim();
    const parent=document.getElementById('parentName').value.trim();
    const participantSignature=document.getElementById('participantSignature').value.trim();
    const parentSignature=document.getElementById('parentSignature').value.trim();
    const date=document.getElementById('pledgeDate').value;
    const error=document.getElementById('errorBox');

    if (
  !name ||
  !memberId ||
  !parent ||
  !participantSignature ||
  !parentSignature ||
  !date
){
      error.style.display='block';
      return;
    }

    error.style.display='none';
    drawBase();

    drawText('اسم المنتسب',850,485,170,17,'right','#6b7d8d');
    drawText(name,660,485,500,24,'right','#17324a');

    drawText('ولي الأمر',850,600,170,17,'right','#6b7d8d');
    drawText(parent,660,600,500,22,'right','#17324a');

    drawText('رقم التسجيل',410,485,170,17,'right','#6b7d8d');
    drawText(memberId,220,485,260,20,'right','#17324a');

    const values=getSelectedValues();
    const symbols=['★','◆','●','✦','▲','■'];

    values.forEach((value,index)=>{
      const col=index%3;
      const row=Math.floor(index/3);
      const x=790-col*270;
      const y=755+row*92;

      roundedRect(
        x-190,y-30,220,62,18,
        index%2===0?'#eef6fb':'#fff9dc',
        index%2===0?'#bcd9e8':'#ead376',
        1.5
      );

      drawText(
        symbols[index],
        x-165,
        y,
        35,
        25,
        'center',
        index%2===0?'#1b78b3':'#d3a900'
      );

      drawText(value,x+15,y,150,20,'right','#0b2f55');
    });

    drawText(
      'أتعهد بالالتزام والانضباط، واحترام المدربين والزملاء، والمحافظة على مرافق النادي، والتحلي بالروح الرياضية، وتمثيل نادي كلباء بصورة مشرفة.',
      500,1060,790,21,'center','#24465f','normal'
    );

    roundedRect(95,1200,350,90,18,'#f7fbfd','#d3e1e8',1.5);
    roundedRect(555,1200,350,90,18,'#f7fbfd','#d3e1e8',1.5);

    drawText('توقيع ولي الأمر',410,1225,200,16,'right','#6b7d8d');
    drawText(parentSignature,270,1260,300,21,'center','#0b2f55');

    drawText('توقيع المنتسب',870,1225,200,16,'right','#6b7d8d');
    drawText(participantSignature,730,1260,300,21,'center','#0b2f55');

    drawText(`التاريخ: ${formatDate(date)}`,180,1300,260,17,'center','#4d6577','normal');

    generated=true;
    canvas.scrollIntoView({behavior:'smooth',block:'start'});
  }

  function downloadPledge(){
    if(!generated){
      generatePledge();
      if(!generated) return;
    }

    const name=document.getElementById('participantName').value.trim() || 'member';

    const link=document.createElement('a');
    link.download=`عهد-المنتسب-الرياضي-${name}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
  }

  function printPledge(){
    if(!generated){
      generatePledge();
      if(!generated) return;
    }

    const data=canvas.toDataURL('image/png');
    const win=window.open('','_blank');

    win.document.write(`
      <!doctype html>
      <html dir="rtl">
      <head>
        <title>عهد المنتسب الرياضي</title>
        <style>
          body{margin:0;display:flex;justify-content:center;background:#fff}
          img{width:100%;max-width:900px;height:auto}
          @page{size:A4 portrait;margin:0}
        </style>
      </head>
      <body>
        <img src="${data}">
        <script>window.onload=()=>window.print()<\/script>
      </body>
      </html>
    `);

    win.document.close();
  }

  document.addEventListener('click',event=>{
    const searchBox=document.querySelector('.search-box');
    if(!searchBox.contains(event.target)){
      document.getElementById('searchResults').style.display='none';
    }
  });

document.getElementById("pledgeDate").value =
    new Date().toISOString().slice(0,10);

drawBase();
loadMembers();


function sendPageHeight() {
    if (window.parent === window) return;

    window.parent.postMessage({
        type: "kalba-iframe-size",
        height: document.documentElement.scrollHeight
    }, "*");
}

window.addEventListener("load", sendPageHeight);
window.addEventListener("resize", sendPageHeight);

new ResizeObserver(sendPageHeight).observe(document.body);  
</script>
</body>
</html>
