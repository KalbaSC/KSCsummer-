<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رضا أولياء الأمور</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@font-face{
  font-family:'NotoKufiArabic';
  src:url('NotoKufiArabic.ttf') format('truetype');
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:'NotoKufiArabic',Arial,sans-serif;
  background:
    linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.65)),
    url("black_and_yellow_grunge_background.jpg");
  background-size:cover;
  background-position:center;
  color:white;
  padding:24px;
}

.wrapper{
  max-width:1050px;
  margin:auto;
  background:rgba(10,10,10,.92);
  border:2px solid #f4e733;
  border-radius:26px;
  padding:34px;
  box-shadow:0 0 35px rgba(244,231,51,.18);
}

h1{
  text-align:center;
  color:#f4e733;
  font-size:42px;
  margin:0;
}

.subtitle{
  text-align:center;
  color:#ddd;
  font-size:20px;
  margin:10px 0 28px;
}

.top-fields{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-bottom:25px;
}

.field label{
  color:#f4e733;
  font-weight:bold;
  margin-bottom:8px;
  display:block;
}

.input-box{
  position:relative;
}

.input-box i{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  color:#aaa;
}

input, textarea{
  width:100%;
  background:#111;
  color:white;
  border:1px solid #555;
  border-radius:14px;
  padding:15px 45px 15px 15px;
  font-size:16px;
  font-family:'NotoKufiArabic',Arial,sans-serif;
}

textarea{
  min-height:120px;
  resize:none;
  padding:18px;
}

.rating-row{
  display:grid;
  grid-template-columns:190px 1fr;
  align-items:center;
  gap:18px;
  background:linear-gradient(135deg,#1b1b1b,#111);
  border:1px solid #333;
  border-radius:18px;
  padding:14px;
  margin-bottom:14px;
}

.rating-title{
  display:flex;
  align-items:center;
  gap:12px;
  color:white;
  font-weight:bold;
  font-size:17px;
}

.rating-title i{
  width:44px;
  height:44px;
  border:1px solid #f4e733;
  color:#f4e733;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.rating{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.rating button{
  border:1px solid #f4e733;
  border-radius:14px;
  background:#111;
  color:#f4e733;
  min-height:62px;
  cursor:pointer;
  font-family:'NotoKufiArabic',Arial,sans-serif;
  font-size:15px;
  transition:.2s;
}

.rating button strong{
  display:block;
  font-size:20px;
}

.rating button.active{
  background:linear-gradient(135deg,#f4e733,#fff36a);
  color:#000;
  transform:scale(1.04);
  box-shadow:0 0 18px rgba(244,231,51,.45);
}

.notes-box{
  margin-top:18px;
}

.submit-btn{
  width:70%;
  margin:28px auto 10px;
  display:block;
  padding:18px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#f4e733,#fff36a);
  color:#000;
  font-size:26px;
  font-weight:bold;
  font-family:'NotoKufiArabic',Arial,sans-serif;
  cursor:pointer;
}

.submit-btn i{
  margin-left:12px;
}

.privacy{
  text-align:center;
  color:#aaa;
  font-size:14px;
}

.thanks{
  display:none;
  text-align:center;
  padding:80px 20px;
}

.thanks h2{
  color:#f4e733;
  font-size:44px;
}

.thanks p{
  font-size:22px;
  color:#ddd;
}

@media(max-width:768px){
  body{padding:12px}
  .wrapper{padding:20px}
  h1{font-size:30px}
  .subtitle{font-size:16px}
  .top-fields{grid-template-columns:1fr}
  .rating-row{
    grid-template-columns:1fr;
  }
  .rating{
    grid-template-columns:repeat(2,1fr);
  }
  .submit-btn{
    width:100%;
    font-size:21px;
  }
}
</style>
</head>

<body>

<div class="wrapper">

<form id="feedbackForm">

  <h1>رضا أولياء الأمور</h1>
  <div class="subtitle">نُسعد بمشاركتكم تقييمكم لتطوير خدماتنا وبرامجنا</div>

  <div class="top-fields">
    <div class="field">
      <label>اسم ولي الأمر</label>
      <div class="input-box">
        <input type="text" id="parentName" placeholder="اكتب الاسم">
        <i class="fa-solid fa-user"></i>
      </div>
    </div>

    <div class="field">
      <label>رقم الهاتف</label>
      <div class="input-box">
        <input type="tel" id="phone" placeholder="05xxxxxxxx">

      </div>
    </div>
  </div>

  <div class="rating-row">
    <div class="rating-title"><i class="fa-solid fa-trophy"></i> التقييم العام</div>
    <div class="rating" data-name="overall"></div>
  </div>

  <div class="rating-row">
    <div class="rating-title"><i class="fa-solid fa-clipboard-check"></i> سهولة التسجيل</div>
    <div class="rating" data-name="registration"></div>
  </div>

  <div class="rating-row">
    <div class="rating-title"><i class="fa-solid fa-people-group"></i> الاستقبال والتعامل</div>
    <div class="rating" data-name="reception"></div>
  </div>

  <div class="rating-row">
    <div class="rating-title"><i class="fa-solid fa-person-running"></i> الأنشطة والبرنامج</div>
    <div class="rating" data-name="activities"></div>
  </div>

  <div class="rating-row">
    <div class="rating-title"><i class="fa-solid fa-calendar-check"></i> التنظيم العام</div>
    <div class="rating" data-name="organization"></div>
  </div>

  <div class="notes-box">
    <label style="color:#f4e733;font-weight:bold;">ملاحظاتكم</label>
    <textarea id="notes" placeholder="اكتب ملاحظاتك هنا..."></textarea>
  </div>

  <button type="submit" class="submit-btn">
    <i class="fa-solid fa-paper-plane"></i>
    إرسال التقييم
  </button>

  <div class="privacy">
    <i class="fa-solid fa-shield-halved"></i>
    جميع البيانات سرية وتستخدم فقط لتحسين خدماتنا
  </div>

</form>

<div id="thanks" class="thanks">
  <h2>شكراً لكم 🌟</h2>
  <p>تم إرسال تقييمكم بنجاح</p>
</div>

</div>

<script>
function forceInsideMainPortal() {
  if (window.top === window.self) {
    window.location.replace("KSCsummer.html?page=" + location.pathname.split("/").pop());
  }
}

forceInsideMainPortal();
window.addEventListener("pageshow", forceInsideMainPortal);

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGDIAJXMEr7XbGQHIdfZSxqHCEc5zw8yOjUUNipK8G3YeOR9m1FB94kGWeiJoTjh1j/exec";

const values = {
  overall:"",
  registration:"",
  reception:"",
  activities:"",
  organization:""
};

const labels = {
  1:"ضعيف",
  2:"مقبول",
  3:"جيد",
  4:"جيد جداً",
  5:"ممتاز"
};

document.querySelectorAll(".rating").forEach(group => {
  const name = group.dataset.name;

  for(let i = 5; i >= 1; i--){
    const btn = document.createElement("button");
    btn.type = "button";
    btn.innerHTML = `<strong>${i} ⭐</strong>${labels[i]}`;

    btn.onclick = () => {
      values[name] = i;
      group.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    };

    group.appendChild(btn);
  }
});

document.getElementById("feedbackForm").addEventListener("submit", async e => {
  e.preventDefault();

  if(!values.overall){
    alert("يرجى اختيار التقييم العام.");
    return;
  }

  const body = new URLSearchParams();
  body.append("parentName", document.getElementById("parentName").value.trim());
  body.append("phone", document.getElementById("phone").value.trim());
  body.append("overall", values.overall);
  body.append("registration", values.registration);
  body.append("reception", values.reception);
  body.append("activities", values.activities);
  body.append("organization", values.organization);
  body.append("notes", document.getElementById("notes").value.trim());

  await fetch(SCRIPT_URL, {
    method:"POST",
    mode:"no-cors",
    body
  });

  document.getElementById("feedbackForm").style.display = "none";
  document.getElementById("thanks").style.display = "block";

  setTimeout(() => {
    location.reload();
  }, 5000);
});
</script>

<script>
(() => {
  const sendSize = () => {
    const h = Math.max(
      document.body.scrollHeight,
      document.documentElement.scrollHeight
    );
    window.parent.postMessage({type:'kalba-iframe-size', height:h}, '*');
  };

  window.addEventListener('load', sendSize);
  new MutationObserver(sendSize).observe(document.body, {
    childList:true,
    subtree:true,
    attributes:true
  });
})();
</script>

</body>
</html>
