<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التقارير الأسبوعية - نادي كلباء</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@font-face {
  font-family: 'NotoKufiArabic';
  src: url('NotoKufiArabic.ttf') format('truetype');
}

:root {
  --yellow: #f4e733;
  --black: #050505;
  --card: rgba(15,15,15,0.95);
  --border: rgba(244,231,51,0.55);
  --muted: #bdbdbd;
}

body {
  font-family: 'NotoKufiArabic', sans-serif;
  background: transparent;
  color: white;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 1180px;
  margin: 25px auto;
  padding: 18px;
}

.page-title {
  text-align: center;
  margin-bottom: 25px;
}

.page-title h2 {
  color: var(--yellow);
  font-size: 34px;
  margin: 0;
}

.page-title p {
  color: #ddd;
  margin: 8px 0 0;
  font-size: 15px;
}

.form-box,
.filters,
.table-card {
  background: linear-gradient(145deg, rgba(10,10,10,0.97), rgba(28,28,28,0.97));
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 26px;
  margin-bottom: 22px;
  box-shadow: 0 0 25px rgba(244,231,51,0.12);
}

.section-title {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  color: var(--yellow);
  font-size: 22px;
  margin: 0 0 22px;
}

.report-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px 24px;
  align-items: start;
}

.form-group {
  width: 100%;
}

.form-group.full {
  grid-column: span 2;
}

label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
  color: var(--yellow);
  font-size: 14px;
  font-weight: bold;
}

input,
select,
textarea {
  width: 100%;
  padding: 13px 14px;
  border-radius: 13px;
  border: 1px solid #444;
  background: #000;
  color: white;
  box-sizing: border-box;
  font-family: 'NotoKufiArabic', sans-serif;
  font-size: 14px;
}

textarea {
  min-height: 105px;
  resize: vertical;
}

input:focus,
select:focus,
textarea:focus {
  outline: none;
  border-color: var(--yellow);
  box-shadow: 0 0 10px rgba(244,231,51,0.35);
}

.upload-box {
  border: 1px dashed var(--yellow);
  border-radius: 16px;
  padding: 22px;
  background: rgba(0,0,0,0.45);
}

.upload-box input {
  border: none;
  padding: 0;
}

button {
  width: 100%;
  margin-top: 18px;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #f4e733, #fff36a);
  color: #000;
  font-weight: bold;
  cursor: pointer;
  font-family: 'NotoKufiArabic', sans-serif;
  font-size: 15px;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  filter: brightness(1.06);
}

.status {
  text-align: center;
  margin-top: 15px;
  font-weight: bold;
  padding: 12px;
  border-radius: 12px;
  color: var(--yellow);
}

.filters-row {
  display: grid;
  grid-template-columns: 1fr 160px;
  gap: 12px;
  align-items: center;
}

.filters button {
  margin-top: 0;
}

.table-card {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 10px;
}

th {
  color: var(--yellow);
  padding: 12px;
  font-size: 14px;
  white-space: nowrap;
}

td {
  background: rgba(30,30,30,0.95);
  padding: 14px;
  text-align: center;
  color: white;
  border-top: 1px solid rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

td:first-child {
  border-radius: 0 14px 14px 0;
}

td:last-child {
  border-radius: 14px 0 0 14px;
}

.view-btn,
.download-btn {
  display: inline-block;
  padding: 8px 14px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  margin: 3px;
  width: auto;
  font-size: 13px;
}

.view-btn {
  background: #0d6efd;
  color: white;
  border: 1px solid #4da3ff;
}

.download-btn {
  background: var(--yellow);
  color: black;
}

.empty-cell {
  color: var(--muted);
  padding: 25px;
}

@media (max-width: 768px) {
  .container {
    width: 94%;
    padding: 10px;
  }

  .page-title h2 {
    font-size: 24px;
  }

  .form-box,
  .filters,
  .table-card {
    padding: 18px;
  }

  .report-grid,
  .filters-row {
    grid-template-columns: 1fr;
  }

  .form-group.full {
    grid-column: span 1;
  }

  table {
    font-size: 11px;
  }

  th,
  td {
    padding: 9px;
  }
}
</style>
</head>

<body>

<div class="container">
 <div class="page-title">
  <h2>📄 التقارير الأسبوعية الداخلية</h2>
  <p>قم بتعبئة بيانات التقرير ورفع الملف الأسبوعي</p>
</div>

  <div class="form-box">
<h3 class="section-title">
  <i class="fa-solid fa-file-arrow-up"></i>
  رفع تقرير أسبوعي
</h3>

<div class="report-grid">
  <div>
    <label>الأسبوع</label>
    <input type="week" id="week">
  </div>
      
<div class="form-group">
  <label>النشاط</label>
    <select id="activity">
      <option value="">اختر النشاط</option>
      <option>عام</option>
      <option>ورش</option>
      <option>زيارات خارجية</option>
      <option>شطرنج</option>
      <option>كرة قدم</option>
      <option>كرة سلة</option>
      <option>كرة طائرة</option>
      <option>كرة يد</option>
      <option>العاب ثقافية</option>
      <option>خماسي حديث</option>
      <option>لياقة بدنية</option>
      <option>ورش تطبيقية</option>
    </select>
  </div>

<div class="form-group">
  <label>اسم الموظف</label>
    <input type="text" id="staff" placeholder="مثال: روند">
  </div>

<div class="form-group">
  <label><i class="fa-solid fa-pen"></i> ملاحظات</label>
  <textarea id="notes" rows="3" placeholder="اكتب ملاحظات التقرير هنا..."></textarea>
</div>

<div class="form-group full">
  <label><i class="fa-solid fa-paperclip"></i> ملف التقرير</label>
  <div class="upload-box">
    <input type="file" id="reportFile" accept=".pdf,.doc,.docx,.xlsx,.ppt,.pptx">
  </div>
</div>
</div>

<button onclick="uploadReport()">
  رفع التقرير <i class="fa-solid fa-cloud-arrow-up"></i>
</button>
    
    <div id="status" class="status"></div>
  </div>

  <div class="filters">
<h3 class="section-title">
  <i class="fa-solid fa-magnifying-glass"></i>
  البحث في التقارير
</h3>

<div class="filters-row">
  <input type="text" id="searchInput" placeholder="ابحث باسم الموظف أو النشاط أو الأسبوع..." onkeyup="renderReports()">
  <button onclick="loadReports()">
    تحديث <i class="fa-solid fa-rotate-right"></i>
  </button>
</div>
  </div>

  <div class="table-card">
  <table>
    <thead>
      <tr>
        <th>الأسبوع</th>
        <th>النشاط</th>
        <th>الموظف</th>
        <th>ملاحظات</th>
        <th>اسم الملف</th>
        <th>الإجراء</th>
      </tr>
    </thead>
    <tbody id="reportsTable">
      <tr>
        <td colspan="6">جاري تحميل التقارير...</td>
      </tr>
    </tbody>
  </table>
</div>
  </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxt35kU8xR_-hUrPXGGQT80jk17KfG1k3SR15Ei5w26ffc7s5M3wt7Fh4Yh3g-KUyKq/exec";

let reportsData = [];

async function uploadReport() {
  const week = document.getElementById("week").value;
  const activity = document.getElementById("activity").value;
  const staff = document.getElementById("staff").value.trim();
  const notes = document.getElementById("notes").value.trim();
  const fileInput = document.getElementById("reportFile");
  const status = document.getElementById("status");

  if (!week || !activity || !staff || !fileInput.files[0]) {
    alert("يرجى تعبئة الأسبوع والنشاط واسم الموظف ورفع الملف.");
    return;
  }

  const file = fileInput.files[0];

if (file.size > 20 * 1024 * 1024) {
  alert("حجم الملف كبير. الرجاء رفع ملف أقل من 20MB أو تحويله إلى PDF.");
  return;
}
  const reader = new FileReader();

  status.innerHTML = "⏳ جاري رفع التقرير...";

  reader.onload = async function(e) {
    const base64 = e.target.result.split(",")[1];

    const data = new URLSearchParams();
    data.append("week", week);
    data.append("activity", activity);
    data.append("staff", staff);
    data.append("notes", notes);
    data.append("fileName", file.name);
    data.append("mimeType", file.type || getMimeTypeFromName(file.name));
    data.append("fileData", base64);

    try {
const response = await fetch(SCRIPT_URL, {
  method: "POST",
  body: data
});

const result = await response.text();

if (result.trim() === "success") {
  status.innerHTML = "✅ تم رفع التقرير بنجاح";
  await loadReports();
} else {
  status.innerHTML = "❌ " + result;
}

      document.getElementById("week").value = "";
      document.getElementById("activity").value = "";
      document.getElementById("staff").value = "";
      document.getElementById("notes").value = "";
      document.getElementById("reportFile").value = "";

      setTimeout(loadReports, 2000);

    } catch (err) {
      console.error(err);
      status.innerHTML = "❌ حدث خطأ أثناء رفع التقرير";
    }
  };

  reader.readAsDataURL(file);
}

async function loadReports() {
  const tbody = document.getElementById("reportsTable");
  tbody.innerHTML = `<tr><td colspan="6">جاري تحميل التقارير...</td></tr>`;

  try {
    const res = await fetch(SCRIPT_URL);
    reportsData = await res.json();
    renderReports();
  } catch (err) {
    console.error(err);
    tbody.innerHTML = `<tr><td colspan="6">حدث خطأ في تحميل التقارير</td></tr>`;
  }
}

function renderReports() {
  const tbody = document.getElementById("reportsTable");
  const search = document.getElementById("searchInput").value.toLowerCase().trim();

  const filtered = reportsData.filter(r => {
    const staffName = r["Staff Name"] || r.Staff || "";
    const text = `${r.Week || ""} ${r.Activity || ""} ${staffName} ${r.Notes || ""}`.toLowerCase();
    return text.includes(search);
  });

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6">لا توجد تقارير</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.reverse().map(r => `
    <tr>
      <td>${r.Week || ""}</td>
      <td>${r.Activity || ""}</td>
      <td>${r["Staff Name"] || r.Staff || ""}</td>
      <td>${r.Notes || ""}</td>
      <td>${r["File Name"] || ""}</td>
<td>
<button class="view-btn"
        onclick="openDriveFile('${getDrivePreviewLink(r["File Link"] || "#")}')">
  👁️ عرض
</button>

  <a class="download-btn" href="${r["File Link"] || "#"}" target="_blank">
    📥 تحميل
  </a>
</td>
    </tr>
  `).join("");
}

document.addEventListener("DOMContentLoaded", loadReports);
</script>

<script>
(() => {
  const isEmbedded = new URLSearchParams(location.search).has('embed');
  if (isEmbedded) {
    const style = document.createElement('style');
    style.textContent = `
      header.header-container, .header-container, .footer-container, footer { display: none !important; }
      html, body { background: transparent !important; }
    `;
    document.head.appendChild(style);
  }

  const sendSize = () => {
    const b = document.body, e = document.documentElement;
    const h = Math.max(
      b.scrollHeight, b.offsetHeight, b.clientHeight,
      e.scrollHeight, e.offsetHeight, e.clientHeight
    );
    window.parent.postMessage({ type: 'kalba-iframe-size', height: h }, '*');
  };

  const mo = new MutationObserver(() => sendSize());
  mo.observe(document.documentElement, { childList: true, subtree: true, attributes: true });

  window.addEventListener('load', sendSize, true);
  setTimeout(sendSize, 300);
})();

  
function getDrivePreviewLink(url) {
  const match = url.match(/\/d\/([^/]+)/) || url.match(/id=([^&]+)/);
  if (!match) return url;

  const fileId = match[1];
  return `https://drive.google.com/file/d/${fileId}/view`;
}

function openDriveFile(url) {
  window.parent.postMessage({
    type: "open-drive-file",
    url: url
  }, "*");
}

function getMimeTypeFromName(name) {
  const ext = name.split(".").pop().toLowerCase();

  const types = {
    pdf: "application/pdf",
    doc: "application/msword",
    docx: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
    xls: "application/vnd.ms-excel",
    xlsx: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
    ppt: "application/vnd.ms-powerpoint",
    pptx: "application/vnd.openxmlformats-officedocument.presentationml.presentation"
  };

  return types[ext] || "application/octet-stream";
}  
</script>

</body>

</html>
