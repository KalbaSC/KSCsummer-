<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التقارير الأسبوعية - نادي كلباء</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@font-face {
  font-family: 'NotoKufiArabic';
  src: url('NotoKufiArabic.ttf') format('truetype');
}

body {
  font-family: 'NotoKufiArabic', sans-serif;
  background: transparent;
  color: white;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 1150px;
  margin: 25px auto;
  padding: 20px;
}

h2 {
  text-align: center;
  color: #f4e733;
  font-size: 28px;
  margin-bottom: 25px;
}

.form-box, .filters {
  background: linear-gradient(145deg, #111, #1c1c1c);
  border: 1px solid #f4e733;
  border-radius: 18px;
  padding: 22px;
  margin-bottom: 22px;
  box-shadow: 0 0 18px rgba(244, 231, 51, 0.15);
}

.form-box h3,
.filters h3 {
  color: #f4e733;
  margin-top: 0;
  text-align: center;
}

label {
  display: block;
  margin-top: 12px;
  color: #f4e733;
  font-size: 14px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 12px;
  border: 1px solid #444;
  background: #000;
  color: white;
  box-sizing: border-box;
  font-family: 'NotoKufiArabic', sans-serif;
}

input:focus,
select:focus,
textarea:focus {
  outline: none;
  border-color: #f4e733;
  box-shadow: 0 0 8px rgba(244, 231, 51, 0.4);
}

button {
  width: 100%;
  margin-top: 18px;
  padding: 13px;
  border: none;
  border-radius: 12px;
  background: #f4e733;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  font-family: 'NotoKufiArabic', sans-serif;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  background: #fff36a;
}

.status {
  text-align: center;
  color: #f4e733;
  margin-top: 12px;
  font-weight: bold;
}

.table-card {
  background: #111;
  border: 1px solid #f4e733;
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 0 18px rgba(244, 231, 51, 0.12);
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 10px;
}

th {
  color: #f4e733;
  padding: 12px;
  font-size: 14px;
}

td {
  background: #1b1b1b;
  padding: 13px;
  text-align: center;
  color: white;
}

td:first-child {
  border-radius: 0 12px 12px 0;
}

td:last-child {
  border-radius: 12px 0 0 12px;
}

a.download-btn {
  background: #f4e733;
  color: black;
  padding: 7px 14px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  display: inline-block;
}

a.download-btn:hover {
  background: white;
}

.report-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

@media (max-width: 768px) {
  .container {
    width: 94%;
    padding: 10px;
  }

  h2 {
    font-size: 22px;
  }

  .report-grid {
    grid-template-columns: 1fr;
  }

  table {
    font-size: 11px;
  }

  th, td {
    padding: 8px;
  }
}
 .view-btn,
.download-btn {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  margin: 2px;
}

.view-btn {
  background: #2196F3;
  color: white;
  border: none;
  width: auto;
  padding: 7px 14px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  font-family: 'NotoKufiArabic', sans-serif;
}

.download-btn {
  background: #f4e733;
  color: black;
} 
</style>
</head>

<body>

<div class="container">
  <h2>📄 التقارير الأسبوعية الداخلية</h2>

  <div class="form-box">
    <h3 style="color:#f4e733;">رفع تقرير أسبوعي</h3>

    <div class="report-grid">
  <div>
    <label>الأسبوع</label>
    <input type="week" id="week">
  </div>
      
 <div>
    <label>النشاط</label>
    <select id="activity">
      <option value="">اختر النشاط</option>
      <option>عام</option>
      <option>ورش</option>
      <option>زيارات خارجية</option>
      <option>شطرنج</option>
      <option>كرة قدم</option>
      <option>كرة سلة</option>
      <option>كرة طائرة</option>
      <option>كرة يد</option>
      <option>العاب ثقافية</option>
      <option>خماسي حديث</option>
      <option>لياقة بدنية</option>
      <option>ورش تطبيقية</option>
    </select>
  </div>

  <div>
    <label>اسم الموظف</label>
    <input type="text" id="staff" placeholder="مثال: روند">
  </div>

    <label>ملاحظات</label>
    <textarea id="notes" rows="3" placeholder="اكتب ملاحظات التقرير"></textarea>

  <div>
    <label>ملف التقرير</label>
    <input type="file" id="reportFile" accept=".pdf,.doc,.docx,.xlsx,.ppt,.pptx">
  </div>
</div>

    <button onclick="uploadReport()">رفع التقرير</button>

    <div id="status" class="status"></div>
  </div>

  <div class="filters">
    <h3 style="color:#f4e733;">البحث في التقارير</h3>

    <input type="text" id="searchInput" placeholder="بحث باسم الموظف أو النشاط أو الأسبوع" onkeyup="renderReports()">

    <button onclick="loadReports()">تحديث التقارير</button>
  </div>

  <div class="table-card">
  <table>
    <thead>
      <tr>
        <th>الأسبوع</th>
        <th>النشاط</th>
        <th>الموظف</th>
        <th>ملاحظات</th>
        <th>اسم الملف</th>
        <th>الإجراء</th>
      </tr>
    </thead>
    <tbody id="reportsTable">
      <tr>
        <td colspan="6">جاري تحميل التقارير...</td>
      </tr>
    </tbody>
  </table>
</div>
  </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxt35kU8xR_-hUrPXGGQT80jk17KfG1k3SR15Ei5w26ffc7s5M3wt7Fh4Yh3g-KUyKq/exec";

let reportsData = [];

async function uploadReport() {
  const week = document.getElementById("week").value;
  const activity = document.getElementById("activity").value;
  const staff = document.getElementById("staff").value.trim();
  const notes = document.getElementById("notes").value.trim();
  const fileInput = document.getElementById("reportFile");
  const status = document.getElementById("status");

  if (!week || !activity || !staff || !fileInput.files[0]) {
    alert("يرجى تعبئة الأسبوع والنشاط واسم الموظف ورفع الملف.");
    return;
  }

  const file = fileInput.files[0];
  const reader = new FileReader();

  status.innerHTML = "⏳ جاري رفع التقرير...";

  reader.onload = async function(e) {
    const base64 = e.target.result.split(",")[1];

    const data = new URLSearchParams();
    data.append("week", week);
    data.append("activity", activity);
    data.append("staff", staff);
    data.append("notes", notes);
    data.append("fileName", file.name);
    data.append("mimeType", file.type);
    data.append("fileData", base64);

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: data
      });

      status.innerHTML = "✅ تم رفع التقرير بنجاح";

      document.getElementById("week").value = "";
      document.getElementById("activity").value = "";
      document.getElementById("staff").value = "";
      document.getElementById("notes").value = "";
      document.getElementById("reportFile").value = "";

      setTimeout(loadReports, 2000);

    } catch (err) {
      console.error(err);
      status.innerHTML = "❌ حدث خطأ أثناء رفع التقرير";
    }
  };

  reader.readAsDataURL(file);
}

async function loadReports() {
  const tbody = document.getElementById("reportsTable");
  tbody.innerHTML = `<tr><td colspan="6">جاري تحميل التقارير...</td></tr>`;

  try {
    const res = await fetch(SCRIPT_URL);
    reportsData = await res.json();
    renderReports();
  } catch (err) {
    console.error(err);
    tbody.innerHTML = `<tr><td colspan="6">حدث خطأ في تحميل التقارير</td></tr>`;
  }
}

function renderReports() {
  const tbody = document.getElementById("reportsTable");
  const search = document.getElementById("searchInput").value.toLowerCase().trim();

  const filtered = reportsData.filter(r => {
    const staffName = r["Staff Name"] || r.Staff || "";
    const text = `${r.Week || ""} ${r.Activity || ""} ${staffName} ${r.Notes || ""}`.toLowerCase();
    return text.includes(search);
  });

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6">لا توجد تقارير</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.reverse().map(r => `
    <tr>
      <td>${r.Week || ""}</td>
      <td>${r.Activity || ""}</td>
      <td>${r["Staff Name"] || r.Staff || ""}</td>
      <td>${r.Notes || ""}</td>
      <td>${r["File Name"] || ""}</td>
<td>
<button class="view-btn"
        onclick="openDriveFile('${getDrivePreviewLink(r["File Link"] || "#")}')">
  👁️ عرض
</button>

  <a class="download-btn" href="${r["File Link"] || "#"}" target="_blank">
    📥 تحميل
  </a>
</td>
    </tr>
  `).join("");
}

document.addEventListener("DOMContentLoaded", loadReports);
</script>

<script>
(() => {
  const isEmbedded = new URLSearchParams(location.search).has('embed');
  if (isEmbedded) {
    const style = document.createElement('style');
    style.textContent = `
      header.header-container, .header-container, .footer-container, footer { display: none !important; }
      html, body { background: transparent !important; }
    `;
    document.head.appendChild(style);
  }

  const sendSize = () => {
    const b = document.body, e = document.documentElement;
    const h = Math.max(
      b.scrollHeight, b.offsetHeight, b.clientHeight,
      e.scrollHeight, e.offsetHeight, e.clientHeight
    );
    window.parent.postMessage({ type: 'kalba-iframe-size', height: h }, '*');
  };

  const mo = new MutationObserver(() => sendSize());
  mo.observe(document.documentElement, { childList: true, subtree: true, attributes: true });

  window.addEventListener('load', sendSize, true);
  setTimeout(sendSize, 300);
})();

  
function getDrivePreviewLink(url) {
  const match = url.match(/\/d\/([^/]+)/) || url.match(/id=([^&]+)/);
  if (!match) return url;

  const fileId = match[1];
  return `https://drive.google.com/file/d/${fileId}/view`;
}

function openDriveFile(url) {
  window.parent.postMessage({
    type: "open-drive-file",
    url: url
  }, "*");
}
</script>

</body>

</html>
